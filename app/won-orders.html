<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>买到的车 · 唯车拍</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f4f5f7; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #f4f5f7; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }
  .tab { position: relative; padding: 6px 4px; color: #4b5563; font-size: 14px; cursor: pointer; }
  .tab.active { color: #111827; font-weight: 600; }
  .tab.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 28px; height: 3px; background: #111827; border-radius: 3px; }
  .btn-outline { display: inline-flex; align-items: center; justify-content: center; height: 34px; padding: 0 18px; border-radius: 999px; background: #f1f3f5; color: #6b7280; font-size: 13px; }
  .btn-primary { display: inline-flex; align-items: center; justify-content: center; height: 34px; padding: 0 18px; border-radius: 999px; background: #fde2e2; color: #ef4444; font-size: 13px; font-weight: 500; }
  .status-label { color: #2563eb; font-size: 13px; }
  .scrap-stamp { position: absolute; right: 14px; bottom: 14px; width: 64px; height: 64px; border-radius: 50%; border: 2px solid #ef4444; color: #ef4444; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transform: rotate(-12deg); background: rgba(255,255,255,.6); }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell pb-6">

  <div class="flex items-center justify-between px-5 pt-2 text-[13px] text-slate-700">
    <span>11:31</span>
    <span class="flex items-center gap-1 opacity-70">
      <i data-lucide="bell-off" class="w-3.5 h-3.5"></i>
      <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
      <i data-lucide="battery-full" class="w-3.5 h-3.5"></i>
      <span class="text-xs">64</span>
    </span>
  </div>

  <div class="flex items-center justify-between px-4 py-3 bg-white">
    <button type="button" @click="back" class="text-slate-800"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
    <span class="text-[17px] font-semibold text-slate-900">买到的车</span>
    <span class="w-6"></span>
  </div>

  <div class="bg-white px-6 border-b border-slate-100">
    <div class="flex justify-between py-3">
      <span v-for="t in tabs" :key="t.key" :class="['tab', { active: activeTab === t.key }]" @click="activeTab = t.key">{{ t.label }}</span>
    </div>
  </div>

  <div class="px-3 pt-3 space-y-3">
    <a v-for="o in visibleOrders" :key="o.id"
       :href="orderHref(o)"
       :class="['block bg-white rounded-2xl p-4 shadow-sm', o.scrap ? 'relative' : '']">
      <div class="status-label mb-2">{{ o.statusLabel }}</div>
      <div class="flex gap-3">
        <img :src="o.img" @error="imgFallback" class="w-24 h-20 rounded-lg object-cover flex-shrink-0" :alt="o.alt">
        <div class="flex-1 min-w-0">
          <div class="text-[14px] text-slate-900 leading-snug line-clamp-2">{{ o.name }}</div>
          <div class="flex items-center justify-between mt-2">
            <span class="text-xs text-slate-400">{{ o.plate }} |</span>
            <span class="text-[15px] font-semibold text-slate-900">¥{{ o.total.toFixed(2) }}</span>
          </div>
          <div v-if="o.timeout" class="text-[12px] text-rose-500 mt-1.5">剩余时间:支付超时</div>
        </div>
      </div>
      <div v-if="!o.scrap" class="flex justify-end gap-2 mt-3" @click.stop>
        <button v-for="btn in o.actions" :key="btn.label" :class="btn.primary ? 'btn-primary' : 'btn-outline'">{{ btn.label }}</button>
      </div>
      <div v-if="o.scrap" class="scrap-stamp">报废车</div>
    </a>
  </div>
</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script>
const { createApp, ref, computed, onMounted } = Vue;

createApp({
  setup() {
    const activeTab = ref('all');

    const tabs = [
      { key:'all',     label:'全部' },
      { key:'pending', label:'待付款' },
      { key:'confirm', label:'待确认' },
      { key:'done',    label:'已完成' }
    ];

    const orders = [
      { id:'ORD20260306001',        status:'done',    statusLabel:'已完成订单',
        name:'宝马 5 Series [5系] 535i 2011款 3.0T 手自一体 领先运动型', plate:'粤A78546', total:31300, alt:'bmw',
        img:'https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=400&q=70',
        actions:[ { label:'提车与授权' }, { label:'提交过户资料', primary:true } ] },
      { id:'9026030672789758632',   status:'pending', statusLabel:'待支付订单', timeout:true,
        name:'保时捷 Panamera(进口) 2014款 保时捷Panamera 3.0T', plate:'粤HSB009', total:3000, alt:'panamera',
        img:'https://images.unsplash.com/photo-1611821064430-0d40291d0f0b?auto=format&fit=crop&w=400&q=70',
        actions:[ { label:'确认过户对象' }, { label:'立即支付', primary:true } ] },
      { id:'9026030672789758633',   status:'pending', statusLabel:'待支付订单', timeout:true,
        name:'保时捷 Panamera(进口) 2014款 保时捷Panamera 3.0T', plate:'闽A12345', total:7366, alt:'panamera',
        img:'https://images.unsplash.com/photo-1571607388263-1044f9ea01dd?auto=format&fit=crop&w=400&q=70',
        actions:[ { label:'确认过户对象' }, { label:'立即支付', primary:true } ] },
      { id:'9026030672789758634',   status:'pending', statusLabel:'待支付订单', timeout:true, scrap:true,
        name:'别克 E4 2023款 智享版', plate:'闽AB6688', total:1700, alt:'buick',
        img:'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=400&q=70' }
    ];

    const visibleOrders = computed(() =>
      activeTab.value === 'all' ? orders : orders.filter(o => o.status === activeTab.value)
    );

    function orderHref(o) {
      const img = o.alt || 'car';
      return `won-order-detail.html?id=${o.id}&status=${o.status}&plate=${encodeURIComponent(o.plate)}&total=${o.total}&img=${img}`;
    }

    function imgFallback(e) {
      const div = document.createElement('div');
      div.className = 'w-24 h-20 rounded-lg bg-slate-200 flex items-center justify-center flex-shrink-0';
      div.innerHTML = '<i data-lucide="car" class="w-8 h-8 text-slate-400"></i>';
      e.target.replaceWith(div);
      window.lucide && lucide.createIcons();
    }

    function back() { smartBack('profile-loggedin.html'); }

    onMounted(() => lucide.createIcons());

    return { activeTab, tabs, visibleOrders, orderHref, imgFallback, back };
  }
}).mount('#app');
</script>
</body>
</html>
