<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>权益商城 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a0e3d; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #f8fafc; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }
  .hero-bg { background: linear-gradient(180deg, #2e1065 0%, #4c1d95 60%, #f8fafc 100%); }
  .cat.active { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff; }
  .cat { color: #64748b; background: #fff; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <div class="hero-bg pt-2">
    <div class="flex items-center justify-between px-5 py-2 text-white text-sm">
      <span>19:50</span>
      <span class="flex items-center gap-1"><i data-lucide="bell" class="w-3 h-3"></i><i data-lucide="wifi" class="w-3 h-3"></i><i data-lucide="battery-full" class="w-3 h-3"></i><span class="text-xs">85%</span></span>
    </div>
    <div class="flex items-center justify-between px-5 pb-4">
      <button type="button" @click="back" class="text-white cursor-pointer"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
      <span class="text-white text-base font-semibold">权益商城</span>
      <a href="my-rewards.html" class="text-white text-xs flex items-center gap-1"><i data-lucide="ticket" class="w-3.5 h-3.5"></i>我的</a>
    </div>

    <div class="mx-4 pb-6">
      <div class="bg-white/10 backdrop-blur border border-white/20 rounded-2xl p-4 text-white flex items-center justify-between">
        <div>
          <div class="text-xs opacity-80">我的金币</div>
          <div class="text-3xl font-bold mt-1">{{ currentBalance }}</div>
        </div>
        <div class="text-right">
          <div class="text-xs opacity-80">我的等级</div>
          <div class="text-lg font-bold mt-1">V2</div>
        </div>
      </div>
    </div>
  </div>

  <div class="px-4 -mt-2 relative z-10 mb-4">
    <div class="flex gap-2 overflow-x-auto pb-2">
      <button v-for="c in cats" :key="c.key"
              :class="['cat px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap', activeCat === c.key ? 'active shadow-sm' : 'border border-slate-200']"
              @click="activeCat = c.key">
        <i v-if="c.icon" :data-lucide="c.icon" class="w-3 h-3 inline mr-0.5"></i>{{ c.label }}
      </button>
    </div>
  </div>

  <!-- Banner 新人包 -->
  <div class="px-4 mb-4">
    <div class="rounded-2xl bg-gradient-to-r from-amber-400 to-orange-500 p-4 flex items-center gap-3 text-white">
      <i data-lucide="party-popper" class="w-7 h-7"></i>
      <div class="flex-1">
        <div class="text-sm font-bold">新人首次服务包</div>
        <div class="text-[11px] opacity-90">V0 专享 · 1 金币即可兑换</div>
      </div>
      <button @click="claimNewbiePack" class="bg-white/20 backdrop-blur rounded-full px-3 py-1 text-xs font-semibold">立即领</button>
    </div>
  </div>

  <template v-for="section in sections" :key="section.cat">
    <div v-show="activeCat === 'all' || activeCat === section.cat" class="px-4 mb-2 mt-4">
      <div class="text-xs font-semibold text-slate-500 mb-2 flex items-center gap-1">
        <i :data-lucide="section.icon" class="w-3 h-3"></i>{{ section.title }}
      </div>
    </div>
    <div v-show="activeCat === 'all' || activeCat === section.cat" class="px-4 pb-2">
      <div class="grid grid-cols-2 gap-3">
        <div v-for="(item, i) in section.items" :key="i"
             :class="['bg-white rounded-2xl overflow-hidden shadow-sm relative', item.locked ? 'opacity-60' : '', item.recommend ? 'ring-2 ring-violet-200' : '']">
          <div v-if="item.recommend" class="absolute top-2 right-2 px-1.5 py-0.5 bg-amber-400 text-amber-900 text-[9px] rounded z-10 font-bold">推荐</div>
          <div v-if="item.lockTag" class="absolute top-2 left-2 px-1.5 py-0.5 bg-amber-500 text-white text-[9px] rounded z-10 inline-flex items-center gap-0.5">
            <i data-lucide="lock" class="w-2.5 h-2.5"></i>{{ item.lockTag }}
          </div>
          <div :class="['h-24 flex items-center justify-center text-white', item.bg]">
            <i :data-lucide="item.icon" class="w-10 h-10"></i>
          </div>
          <div class="p-3">
            <div class="text-sm font-semibold text-slate-800">{{ item.name }}</div>
            <div v-if="item.sub" :class="['text-[10px] mt-1', item.subCls]" v-html="item.sub"></div>
            <div class="flex items-center justify-between mt-3">
              <span v-if="item.price" :class="['text-base font-bold', item.locked ? 'text-slate-400' : 'text-violet-600']">
                {{ item.price }}<span class="text-[10px] font-normal ml-0.5">金币</span>
              </span>
              <span v-else class="text-xs text-slate-500">等级直达</span>

              <button v-if="item.locked" class="px-3 py-1 bg-slate-300 text-white rounded-full text-[11px] cursor-not-allowed">{{ item.lockedBtn || '未解锁' }}</button>
              <button v-else-if="item.directBtn" :class="['px-3 py-1 text-white rounded-full text-[11px]', item.directBtnCls || 'bg-emerald-500']">{{ item.directBtn }}</button>
              <button v-else @click="openRedeem(item)" class="px-3 py-1 bg-violet-600 text-white rounded-full text-[11px]">兑换</button>
            </div>
            <div v-if="item.stock" class="text-[10px] text-slate-400 mt-1.5">{{ item.stock }}</div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <div class="text-center text-xs text-slate-400 py-6">— 更多权益持续上新 —</div>

</div>

<!-- 兑换确认弹窗 -->
<div v-if="redeemItem" class="fixed inset-0 z-50 flex items-center justify-center p-6" style="background:rgba(0,0,0,.55);backdrop-filter:blur(3px)" @click.self="redeemItem = null">
  <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
    <div class="bg-gradient-to-r from-violet-600 to-indigo-600 p-5 text-white text-center">
      <div class="mb-1 inline-flex"><i data-lucide="gift" class="w-7 h-7"></i></div>
      <div class="text-base font-bold">确认兑换</div>
    </div>
    <div class="p-5">
      <div class="text-center mb-4">
        <div class="text-sm text-slate-500 mb-1">即将兑换</div>
        <div class="text-lg font-bold text-slate-800">{{ redeemItem.name }}</div>
        <div class="mt-3 text-2xl font-black text-violet-600">- {{ redeemItem.price }} 金币</div>
        <div class="text-xs text-slate-400 mt-1">兑换后,金币余额:{{ currentBalance - (+redeemItem.price) }} 金币</div>
      </div>
      <div class="bg-violet-50 border border-violet-100 rounded-lg p-3 text-[11px] text-violet-700 mb-1">
        兑换后可在「我的权益卡」查看,30 天内有效。权益卡一经兑换不可退换。
      </div>
    </div>
    <div class="flex gap-3 p-4 border-t border-slate-100">
      <button @click="redeemItem = null" class="flex-1 py-2.5 border border-slate-200 rounded-full text-sm text-slate-600">取消</button>
      <button @click="confirmRedeem" class="flex-1 py-2.5 bg-gradient-to-r from-violet-600 to-indigo-600 text-white rounded-full text-sm font-bold">确认兑换</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div v-if="toastText" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50">
  <div class="bg-slate-800 text-white px-6 py-3 rounded-full text-sm shadow-xl inline-flex items-center gap-1.5">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>{{ toastText }}
  </div>
</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script>
const { createApp, ref, watch, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const currentBalance = ref(356);
    const activeCat = ref('all');
    const redeemItem = ref(null);
    const toastText = ref('');

    const cats = [
      { key:'all',      label:'全部',     icon:null },
      { key:'query',    label:'数据查询', icon:'bar-chart-3' },
      { key:'discount', label:'交易折扣', icon:'tag' },
      { key:'refund',   label:'无偿退车', icon:'undo-2' },
      { key:'service',  label:'等级直达', icon:'headphones' }
    ];

    const sections = [
      { cat:'query', icon:'bar-chart-3', title:'数据查询(金币兑换)', items:[
        { name:'车辆中标价查询卡', icon:'search',      bg:'bg-gradient-to-br from-sky-400 to-blue-500',     price:'200', sub:'V0 及以上可兑换', subCls:'text-slate-400', stock:'库存 823' },
        { name:'交易行情查询卡',   icon:'bar-chart-3', bg:'bg-gradient-to-br from-emerald-400 to-teal-500', price:'200', sub:'V0 及以上可兑换', subCls:'text-slate-400', stock:'库存充足' },
        { name:'历史数据查询卡',   icon:'scroll-text', bg:'bg-gradient-to-br from-amber-400 to-orange-500', price:'200', stock:'V1+ · 库存 612' },
        { name:'保留价查询卡',     icon:'target',      bg:'bg-gradient-to-br from-fuchsia-400 to-pink-500', price:'200', stock:'V1+ · 库存 480' },
        { name:'出险维保数据卡',   icon:'wrench',      bg:'bg-gradient-to-br from-orange-400 to-red-500',   price:'300', stock:'V1+ · 库存 45' },
        { name:'碰撞报告查询卡',   icon:'car-front',   bg:'bg-gradient-to-br from-indigo-400 to-purple-500',price:'200', stock:'V1+ · 库存 688' }
      ]},
      { cat:'discount', icon:'tag', title:'交易折扣(金币兑换)', items:[
        { name:'过户 9.5 折卡', icon:'tag', bg:'bg-gradient-to-br from-violet-400 to-indigo-500', price:'200', recommend:true, stock:'V2+ · 库存 128' },
        { name:'过户 8 折卡',   icon:'tag', bg:'bg-gradient-to-br from-amber-300 to-yellow-500', price:'200', locked:true, lockTag:'V3', sub:'V3专享', subCls:'text-slate-400' }
      ]},
      { cat:'refund', icon:'undo-2', title:'无偿退车(金币兑换)', items:[
        { name:'无理由退车 1 台卡', icon:'undo-2', bg:'bg-gradient-to-br from-rose-400 to-red-500', price:'500', locked:true, lockTag:'V3', sub:'V3专享', subCls:'text-slate-400' }
      ]},
      { cat:'service', icon:'headphones', title:'等级直达(无需金币)', items:[
        { name:'1V1 专属客服',   icon:'headphones',   bg:'bg-gradient-to-br from-teal-400 to-emerald-500', sub:'<i data-lucide="check-circle-2" class="w-3 h-3"></i>已享(V1+)', subCls:'text-emerald-600 font-medium inline-flex items-center gap-0.5', directBtn:'联系' },
        { name:'专属销售顾问',   icon:'briefcase',    bg:'bg-gradient-to-br from-blue-400 to-indigo-500',  sub:'<i data-lucide="check-circle-2" class="w-3 h-3"></i>已享(V1+)', subCls:'text-emerald-600 font-medium inline-flex items-center gap-0.5', directBtn:'查看' },
        { name:'代送车上门',     icon:'truck',        bg:'bg-gradient-to-br from-orange-400 to-amber-500', sub:'含代物流 · V3专享', subCls:'text-slate-400', locked:true, lockTag:'V3', lockedBtn:'去升级' },
        { name:'免费停车服务',   icon:'square-parking', bg:'bg-gradient-to-br from-cyan-400 to-blue-500',   sub:'V3专享', subCls:'text-slate-400', locked:true, lockTag:'V3', lockedBtn:'去升级' }
      ]}
    ];

    function openRedeem(item) { redeemItem.value = item; }
    function confirmRedeem() {
      if (redeemItem.value) currentBalance.value -= (+redeemItem.value.price);
      redeemItem.value = null;
      showToast('兑换成功,已存入我的权益卡');
    }
    function claimNewbiePack() { showToast('新人首次服务包已领取,消耗 1 金币'); }
    function showToast(msg) {
      toastText.value = msg;
      setTimeout(() => { toastText.value = ''; }, 2000);
    }

    function back() { smartBack('member.html'); }

    watch([activeCat, redeemItem, toastText], () => nextTick(() => window.lucide && lucide.createIcons()));
    onMounted(() => lucide.createIcons());

    return { currentBalance, activeCat, cats, sections, redeemItem, toastText, openRedeem, confirmRedeem, claimNewbiePack, back };
  }
}).mount('#app');
</script>
</body>
</html>
