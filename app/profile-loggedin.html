<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人中心 · 唯车拍</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6f8; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #f5f6f8; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }
  .profile-hero { background: radial-gradient(ellipse at 0% 0%, rgba(139, 92, 246, .25) 0%, transparent 50%), radial-gradient(ellipse at 100% 10%, rgba(217, 70, 239, .18) 0%, transparent 50%), linear-gradient(180deg, #0b0617 0%, #1e1030 60%, #2a1559 100%); position: relative; overflow: hidden; }
  .member-banner { background: linear-gradient(120deg, #1a0a42 0%, #3b1978 35%, #5b2ca8 65%, #7a3dd1 100%); position: relative; overflow: hidden; }
  .notification-badge { position: absolute; top: -4px; right: -8px; background: #ef4444; color: white; font-size: 10px; padding: 0 5px; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1; }
  .dot-new { width: 7px; height: 7px; background: #ef4444; border-radius: 50%; display: inline-block; }
  .benefit-card { flex: 0 0 88px; background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.02) 100%); border: 1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
  .hscroll::-webkit-scrollbar { display: none; }
  .hscroll { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <!-- 顶部深色英雄区 -->
  <div class="profile-hero text-white pb-5">
    <div class="relative z-10 flex items-center justify-between px-5 py-2 text-sm">
      <span>13:30</span>
      <span class="flex items-center gap-1 opacity-80"><i data-lucide="signal" class="w-3.5 h-3.5"></i><i data-lucide="wifi" class="w-3.5 h-3.5"></i><i data-lucide="battery-full" class="w-3.5 h-3.5"></i></span>
    </div>

    <div class="relative z-10 flex items-center justify-between px-5 py-3">
      <div></div>
      <div class="flex items-center gap-6">
        <a class="flex flex-col items-center gap-0.5 relative">
          <div class="relative">
            <i data-lucide="message-circle" class="w-6 h-6"></i>
            <span class="dot-new absolute -top-0.5 -right-0.5"></span>
          </div>
          <span class="text-[10px] opacity-90">消息</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-0.5">
          <i data-lucide="settings" class="w-6 h-6"></i>
          <span class="text-[10px] opacity-90">设置</span>
        </a>
      </div>
    </div>

    <!-- 用户 -->
    <div class="relative z-10 px-5 flex items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-orange-400 to-red-500 flex items-center justify-center text-white shadow-lg">
        <i data-lucide="user" class="w-8 h-8"></i>
      </div>
      <div class="flex-1">
        <div class="text-lg font-bold tracking-wide mb-1">130****4608</div>
        <a href="member.html" class="inline-flex items-center gap-1.5 text-xs opacity-90 hover:opacity-100 cursor-pointer">
          <i data-lucide="bar-chart-3" class="w-3.5 h-3.5 text-orange-400"></i>
          <span>近 3 月成交 <span class="text-white font-semibold">12</span> 台</span>
          <i data-lucide="chevron-right" class="w-3 h-3"></i>
        </a>
      </div>
    </div>

    <!-- V2 会员 Banner + 权益横滑 -->
    <a href="member.html" class="block relative z-10 mx-4 mt-4 rounded-3xl member-banner p-4 shadow-2xl">
      <div class="relative z-10 flex items-center justify-between mb-3">
        <div class="flex items-baseline gap-2">
          <span class="text-2xl font-black text-white">V2 会员</span>
          <span class="text-[11px] text-indigo-200">还需 <span class="text-amber-300 font-semibold">18 台</span> 升 V3</span>
        </div>
        <div class="inline-flex items-center gap-1 bg-white/15 backdrop-blur text-xs font-semibold px-2.5 py-1 rounded-full text-white">
          会员中心 <i data-lucide="chevron-right" class="w-3 h-3"></i>
        </div>
      </div>
      <div class="relative z-10 h-1 bg-white/10 rounded-full overflow-hidden mb-3">
        <div class="h-full bg-gradient-to-r from-amber-300 to-yellow-400 rounded-full" style="width:40%"></div>
      </div>
      <!-- 权益横滑 -->
      <div class="relative z-10 hscroll flex gap-2 overflow-x-auto pb-1">
        <div v-for="b in benefits" :key="b.title" :class="['benefit-card rounded-xl p-2.5 text-center', b.locked ? 'opacity-50' : '']">
          <div :class="['h-8 flex items-center justify-center relative', b.color]">
            <i :data-lucide="b.icon" class="w-5 h-5"></i>
            <i v-if="b.locked" data-lucide="lock" class="w-2.5 h-2.5 absolute bottom-0 right-2"></i>
          </div>
          <div class="text-[11px] font-semibold text-white mt-1">{{ b.title }}</div>
          <div v-if="b.desc" class="text-[9px] text-indigo-200">{{ b.desc }}</div>
        </div>
      </div>
    </a>
  </div>

  <!-- 资产入口 -->
  <div class="px-4 -mt-3 relative z-10">
    <div class="bg-white rounded-2xl p-4 shadow-sm grid grid-cols-3 divide-x divide-slate-100">
      <a href="coins.html" class="flex flex-col items-center justify-center gap-0.5 py-1">
        <div class="text-lg font-bold text-amber-600">356</div>
        <div class="text-[11px] text-slate-500 flex items-center gap-0.5">金币 <i data-lucide="chevron-right" class="w-3 h-3"></i></div>
      </a>
      <a href="my-rewards.html" class="flex flex-col items-center justify-center gap-0.5 py-1">
        <div class="text-lg font-bold text-violet-600">5<span class="text-[11px] font-normal text-slate-500 ml-0.5">张</span></div>
        <div class="text-[11px] text-slate-500 flex items-center gap-0.5">权益卡 <i data-lucide="chevron-right" class="w-3 h-3"></i></div>
      </a>
      <a class="flex flex-col items-center justify-center gap-0.5 py-1">
        <div class="text-lg font-bold text-rose-500">0<span class="text-[11px] font-normal text-slate-500 ml-0.5">张</span></div>
        <div class="text-[11px] text-slate-500 flex items-center gap-0.5">优惠券 <i data-lucide="chevron-right" class="w-3 h-3"></i></div>
      </a>
    </div>
  </div>

  <!-- 我的钱包 -->
  <div class="px-4 mt-3 relative z-10">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <i data-lucide="wallet" class="w-5 h-5 text-slate-700"></i>
          <span class="text-sm font-bold text-slate-800">我的钱包</span>
          <i data-lucide="eye-off" class="w-3.5 h-3.5 text-slate-400"></i>
        </div>
        <a class="text-xs text-slate-500 flex items-center">查看全部 <i data-lucide="chevron-right" class="w-3 h-3"></i></a>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <div class="text-[11px] text-slate-400">可用余额(元)</div>
          <div class="text-lg font-bold text-slate-800 tracking-widest mt-0.5">* * * *</div>
        </div>
        <div>
          <div class="text-[11px] text-slate-400">可用保证金(元)</div>
          <div class="text-lg font-bold text-slate-800 tracking-widest mt-0.5">* * * *</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 我的竞价 -->
  <div class="px-4 mt-3">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="mb-3"><span class="text-sm font-bold text-slate-800">我的竞价</span></div>
      <div class="grid grid-cols-4 gap-2 text-center">
        <a v-for="b in bidMenu" :key="b.label" :href="b.href || 'javascript:void(0)'" class="flex flex-col items-center gap-1">
          <div v-if="b.badge" class="relative">
            <i :data-lucide="b.icon" class="w-6 h-6 text-slate-700" style="stroke-width:1.5"></i>
            <span class="notification-badge">{{ b.badge }}</span>
          </div>
          <i v-else :data-lucide="b.icon" class="w-6 h-6 text-slate-700" style="stroke-width:1.5"></i>
          <span class="text-xs text-slate-700">{{ b.label }}</span>
        </a>
      </div>
    </div>
  </div>

  <!-- 我的订单 -->
  <div class="px-4 mt-3">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="mb-3"><span class="text-sm font-bold text-slate-800">我的订单</span></div>
      <div class="grid grid-cols-4 gap-2 text-center">
        <a v-for="o in orderMenu" :key="o.label" :href="o.href || 'javascript:void(0)'" class="flex flex-col items-center gap-1">
          <div v-if="o.badge" class="relative">
            <i :data-lucide="o.icon" class="w-6 h-6 text-slate-700" style="stroke-width:1.5"></i>
            <span class="notification-badge">{{ o.badge }}</span>
          </div>
          <i v-else :data-lucide="o.icon" class="w-6 h-6 text-slate-700" style="stroke-width:1.5"></i>
          <span class="text-xs text-slate-700">{{ o.label }}</span>
        </a>
      </div>
    </div>
  </div>

  <!-- 我的衍生服务订单 -->
  <div class="px-4 mt-3">
    <a class="bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="package" class="w-5 h-5 text-slate-700"></i>
        <span class="text-sm font-bold text-slate-800">我的衍生服务订单</span>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
    </a>
  </div>

  <!-- 我的服务 -->
  <div class="px-4 mt-3 pb-24">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-bold text-slate-800 mb-3">我的服务</div>
      <div class="grid grid-cols-4 gap-2 text-center">
        <a v-for="s in serviceMenu" :key="s.label" class="flex flex-col items-center gap-1">
          <i :data-lucide="s.icon" class="w-6 h-6 text-red-500" style="stroke-width:1.5"></i>
          <span class="text-xs text-slate-700">{{ s.label }}</span>
          <span v-if="s.tag" class="text-[9px] text-slate-400">{{ s.tag }}</span>
        </a>
      </div>
    </div>
  </div>

  <div class="sticky bottom-0 bg-white border-t border-slate-100 px-2 py-2 grid grid-cols-4 text-[11px] text-slate-500">
    <a href="home.html" class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="home" class="w-5 h-5"></i>首页</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="car" class="w-5 h-5"></i>全部车源</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="target" class="w-5 h-5"></i>专场车源</a>
    <a href="profile-loggedin.html" class="flex flex-col items-center gap-0.5 py-1 text-red-500 font-semibold"><i data-lucide="user" class="w-5 h-5"></i>个人中心</a>
  </div>

</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const { createApp, onMounted } = Vue;

createApp({
  setup() {
    const benefits = [
      { title:'过户 9.5 折', desc:'省 300 元', icon:'tag',        color:'text-amber-300' },
      { title:'1V1 客服',   desc:'专属服务',   icon:'headphones', color:'text-emerald-300' },
      { title:'销售顾问',   desc:'1 对 1',    icon:'briefcase',   color:'text-sky-300' },
      { title:'保留价',     desc:'查底价',     icon:'target',     color:'text-violet-300' },
      { title:'历史数据',   desc:'查询',       icon:'scroll-text', color:'text-pink-300' },
      { title:'代送上门',   desc:'V3 解锁',    icon:'truck',       color:'text-slate-300', locked:true }
    ];

    const bidMenu = [
      { label:'进行中', icon:'gavel' },
      { label:'已结束', icon:'hourglass',       badge:'23' },
      { label:'已拍下', icon:'clipboard-check', badge:'99+', href:'won-orders.html' },
      { label:'关注',   icon:'heart' }
    ];

    const orderMenu = [
      { label:'待支付',   icon:'wallet',          badge:'33' },
      { label:'待确认',   icon:'clipboard-check', badge:'1' },
      { label:'已冻结',   icon:'lock' },
      { label:'全部订单', icon:'list',            href:'orders.html' }
    ];

    const serviceMenu = [
      { label:'查维保',   icon:'file-search' },
      { label:'维保出险', icon:'shield-check', tag:'旧版' },
      { label:'帮助中心', icon:'help-circle' },
      { label:'联系客服', icon:'headphones' }
    ];

    onMounted(() => lucide.createIcons());

    return { benefits, bidMenu, orderMenu, serviceMenu };
  }
}).mount('#app');
</script>
</body>
</html>
