<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>竞价出价 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="../shared/reserve-cars.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f0f0; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #f4f5f7; position: relative; padding-bottom: 132px; }
  @media (min-width: 768px) {
    body { background: #f5f5f7; padding: 24px 0; }
    .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; }
  }
  [v-cloak] { display: none; }

  /* 倒计时数字格 */
  .ts-num {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:22px; height:20px;
    background:#1f2937; color:#fff; font-weight:700; font-size:11px;
    border-radius:3px; padding:0 4px;
    font-variant-numeric: tabular-nums;
  }
  .ts-sep { color:#1f2937; font-size:11px; padding: 0 2px; }

  /* 加价按钮 */
  .step-btn {
    background:#fff5f5; color:#ef4444; font-weight:600;
    border:1px solid #fee2e2; border-radius: 8px;
    padding: 10px 0; text-align:center;
    transition: all .15s;
  }
  .step-btn.selected {
    background:#ef4444; color:#fff; border-color:#ef4444;
    box-shadow: 0 4px 10px rgba(239,68,68,.3);
  }
  .step-btn:active { transform: scale(.96); }

  /* 自动出价 */
  .auto-bid {
    background: linear-gradient(135deg, #10b981, #059669);
    color:#fff; font-weight:600;
    border-radius: 8px;
    padding: 10px 14px;
    display:inline-flex; align-items:center; gap:6px;
    box-shadow: 0 4px 10px rgba(16,185,129,.3);
  }

  .reserve-tag {
    display:inline-flex; align-items:center; gap:2px;
    background:#fff7ed; color:#c2410c; font-size:11px;
    padding: 2px 6px; border-radius: 4px; border:1px solid #fed7aa;
  }
  .gray-tag {
    display:inline-flex; align-items:center;
    background:#f1f5f9; color:#64748b; font-size:11px;
    padding: 2px 8px; border-radius: 4px;
  }

  .vip-reveal {
    display:inline-flex; align-items:center; gap:4px;
    background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fde047 100%);
    color: #78350f; font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 9999px;
    box-shadow: 0 4px 10px rgba(245,158,11,.35);
    border: 1px solid #fcd34d;
  }

  .sticky-tip {
    background: linear-gradient(90deg, #fffbeb, #fef3c7);
    color: #92400e; font-size: 13px;
    border-top: 1px solid #fde68a;
    padding: 8px 12px;
  }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-5 py-2 bg-white text-slate-800 text-sm">
    <span>9:41</span>
    <span class="flex items-center gap-1"><i data-lucide="signal" class="w-3.5 h-3.5"></i><i data-lucide="wifi" class="w-3.5 h-3.5"></i><i data-lucide="battery-full" class="w-3.5 h-3.5"></i></span>
  </div>

  <!-- 顶部导航 -->
  <div class="bg-white px-3 py-2 flex items-center gap-2 sticky top-0 z-30 border-b border-slate-100">
    <button type="button" @click="goBack" class="w-8 h-8 flex items-center justify-center text-slate-700"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
    <div class="flex-1 text-center text-base font-semibold text-slate-800">竞价出价</div>
    <div class="w-8"></div>
  </div>

  <template v-if="car">

    <!-- 车辆摘要 -->
    <div class="bg-white px-3 py-3 flex gap-3">
      <div class="w-28 h-20 rounded-lg overflow-hidden bg-slate-200 flex-none">
        <img :src="car.img" :alt="car.brand + car.model" class="w-full h-full object-cover">
      </div>
      <div class="flex-1 min-w-0 flex flex-col justify-between">
        <div>
          <div class="flex items-start gap-1 leading-tight">
            <i data-lucide="map-pin" class="w-3.5 h-3.5 text-red-500 flex-none mt-0.5"></i>
            <div class="text-[14px] font-bold text-slate-800 break-all">
              {{ car.city }}<span class="text-slate-300 mx-1">|</span>{{ car.brand }} {{ car.model }}
              <span class="block">{{ car.spec }}</span>
            </div>
          </div>
          <div class="text-[11px] text-slate-500 mt-1">
            {{ car.plate }}<span class="mx-1.5">|</span>{{ car.date }}<span class="mx-1.5">|</span>{{ car.mileage }}
          </div>
        </div>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-[12px] text-slate-600">起拍价:<span class="text-red-500 font-semibold">¥{{ formatYuan(car.basePrice) }}</span></span>
          <span class="reserve-tag"><i data-lucide="info" class="w-3 h-3"></i>有保留价</span>
        </div>
      </div>
    </div>

    <!-- 当前价 + 倒计时 -->
    <div class="bg-white border-t border-slate-100 px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-[13px] text-slate-500">当前价:</span>
        <span class="text-red-500 font-bold text-[20px] leading-none">¥{{ formatYuan(car.currentPrice) }}</span>
        <span class="gray-tag">未过保留价</span>
      </div>
      <div class="flex items-center gap-0.5">
        <span class="ts-num">{{ pad(car.countdown.d) }}</span><span class="ts-sep">天</span>
        <span class="ts-num">{{ pad(car.countdown.h) }}</span><span class="ts-sep">时</span>
        <span class="ts-num">{{ pad(car.countdown.m) }}</span><span class="ts-sep">分</span>
        <span class="ts-num">{{ pad(car.countdown.s) }}</span><span class="ts-sep">秒</span>
      </div>
    </div>

    <!-- 加价按钮 -->
    <div class="bg-white px-4 py-4">
      <div class="grid grid-cols-4 gap-3">
        <button v-for="step in steps" :key="step"
                :class="['step-btn', selectedStep === step ? 'selected' : '']"
                @click="selectedStep = step">+{{ step }}</button>
      </div>

      <div class="mt-4 flex items-center justify-between">
        <button class="auto-bid"><i data-lucide="zap" class="w-4 h-4"></i>自动出价</button>

        <!-- V 专享 · 查看保留价 -->
        <button v-if="!revealed" class="vip-reveal" @click="onRevealClick">
          <i data-lucide="crown" class="w-3.5 h-3.5"></i>
          <span>查看保留价</span>
        </button>
        <span v-else class="text-[13px] text-amber-700 font-semibold">保留价 <span class="text-red-500 font-black text-[16px]">¥{{ formatYuan(car.reservePrice) }}</span></span>
      </div>

      <div class="mt-3 text-[12px] text-slate-500 leading-relaxed">
        出价代表你已同意 <a href="#" class="text-blue-500">唯普汽车竞价须知、有保留价竞价须知</a>
      </div>
    </div>

    <!-- 总价 -->
    <div class="bg-white mt-1.5 px-4 py-3 flex items-center justify-between border-t border-slate-100">
      <div class="text-[14px] text-slate-700">总价: <span class="font-semibold text-slate-900">¥{{ formatYuan(totalPrice) }}</span></div>
      <button class="text-slate-500 text-[13px] flex items-center gap-1">明细 <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i></button>
    </div>

    <!-- 出价记录 -->
    <div class="bg-white mt-1.5 px-4 py-3">
      <div class="flex items-center justify-between mb-3">
        <div class="text-[15px] font-semibold text-slate-800">出价记录</div>
        <div class="text-[12px] text-slate-400">{{ car.bidHistory.length }}次出价</div>
      </div>
      <div class="space-y-3">
        <div v-for="(b, i) in car.bidHistory" :key="i" class="flex items-start justify-between">
          <div>
            <div class="text-[13px] text-slate-700">出价人:{{ b.user }}</div>
            <div class="text-[11px] text-slate-400 mt-0.5">{{ b.time }}</div>
          </div>
          <div class="text-red-500 font-semibold text-[14px]">¥{{ formatYuan(b.price) }}</div>
        </div>
      </div>
      <div class="text-center text-[11px] text-slate-400 mt-4">只显示最新20条数据</div>
    </div>

  </template>

  <template v-else>
    <div class="text-center py-20 text-slate-400 text-sm">未找到该车辆</div>
  </template>

  <!-- 底部固定区 -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] z-40">
    <div v-if="car" class="sticky-tip flex items-center justify-between gap-2">
      <span class="truncate">当前竞价&lt;保留价,您的出价可自我超越,<a href="#" @click.prevent="onRevealClick" class="underline font-semibold text-amber-700">立即加价锁定爱车</a></span>
      <i data-lucide="hand-pointing-up" class="w-4 h-4 text-amber-700 flex-none"></i>
    </div>

    <div v-if="car" class="bg-white px-4 py-3 flex items-center justify-between border-t border-slate-100">
      <div class="text-[13px] text-slate-400">
        <template v-if="selectedStep">出价金额:<span class="text-red-500 font-bold text-[15px]">¥{{ formatYuan(car.currentPrice + selectedStep) }}</span></template>
        <template v-else>请选择你的加价</template>
      </div>
      <button :class="['px-8 py-3 rounded-full font-semibold text-[15px] transition active:scale-95',
                       selectedStep ? 'bg-red-500 text-white shadow-lg shadow-red-500/30' : 'bg-slate-200 text-white']"
              @click="confirmBid">确定出价</button>
    </div>
  </div>

  <!-- 不符合资格弹框 -->
  <div v-if="showAlert" class="fixed inset-0 z-50 flex items-center justify-center p-6" style="background:rgba(15,23,42,.6)">
    <div class="bg-white rounded-2xl w-full max-w-[300px] overflow-hidden">
      <div class="px-5 pt-5 pb-2 text-center">
        <div class="inline-flex w-12 h-12 rounded-full bg-amber-100 items-center justify-center text-amber-600 mb-3">
          <i data-lucide="lock" class="w-6 h-6"></i>
        </div>
        <div class="text-[16px] font-bold text-slate-800">查看保留价</div>
        <div class="text-[13px] text-slate-500 mt-2 leading-relaxed">V2 及以上可查看车辆保留价</div>
      </div>
      <div class="px-4 pb-4 pt-3 grid grid-cols-2 gap-2">
        <button @click="showAlert = false" class="py-2.5 rounded-full bg-slate-100 text-slate-700 text-[14px] font-semibold">我知道了</button>
        <a href="level.html" class="py-2.5 rounded-full bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[14px] font-semibold text-center">升级会员</a>
      </div>
    </div>
  </div>

</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script>
const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

createApp({
  setup() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'r1';
    const car = ref((window.RESERVE_CARS || []).find(c => c.id === id) || (window.RESERVE_CARS || [])[0]);

    const steps = [2000, 1000, 500, 200];
    const selectedStep = ref(null);
    const revealed = ref(false);
    const showAlert = ref(false);

    const totalPrice = computed(() => {
      if (!car.value) return 0;
      const bid = car.value.currentPrice + (selectedStep.value || 0);
      return bid + car.value.fee + car.value.platformFee + 2000;
    });

    function pad(n) { return String(n).padStart(2, '0'); }
    function goBack() {
      smartBack(car.value ? ('car-detail-reserve.html?id=' + car.value.id) : 'allcars.html');
    }
    function confirmBid() {
      if (!selectedStep.value) return;
      alert('已提交出价 ¥' + window.formatYuan(car.value.currentPrice + selectedStep.value));
    }
    function onRevealClick() {
      const user = window.VPUser && window.VPUser.get();
      if (!user) {
        location.href = 'login.html?from=' + encodeURIComponent(location.pathname + location.search);
        return;
      }
      if (!window.VPUser.canSeeReserve()) {
        showAlert.value = true;
        return;
      }
      revealed.value = true;
    }

    onMounted(() => lucide.createIcons());
    watch([selectedStep, revealed, showAlert], () => nextTick(() => lucide.createIcons()));

    return { car, steps, selectedStep, revealed, showAlert, totalPrice, pad, confirmBid, onRevealClick, goBack, formatYuan: window.formatYuan };
  }
}).mount('#app');
</script>
</body>
</html>
