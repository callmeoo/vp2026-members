<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>等级成长 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a0e3d; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #f8fafc; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }
  .hero-bg { background: linear-gradient(180deg, #2e1065 0%, #4c1d95 60%, #f8fafc 100%); }
  .qa-toggle { cursor: pointer; }
  .qa-answer { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .qa-answer.open { max-height: 500px; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <div class="hero-bg pt-2">
    <div class="flex items-center justify-between px-5 py-2 text-white text-sm">
      <span>09:49</span>
      <span class="flex items-center gap-1"><i data-lucide="wifi" class="w-3 h-3"></i><i data-lucide="battery-full" class="w-3 h-3"></i></span>
    </div>
    <div class="flex items-center justify-between px-5 pb-2">
      <button type="button" @click="back" class="text-white cursor-pointer"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
      <span class="text-white text-base font-semibold">等级成长详情</span>
      <span class="w-5"></span>
    </div>

    <!-- 距下次定级提示 -->
    <div class="px-5 pb-2">
      <div class="text-xs text-amber-300">● 距离下次定级还剩 16 天</div>
    </div>

    <!-- 成交台数(大字) -->
    <div class="px-5 pb-3">
      <div class="flex items-end gap-1">
        <span class="text-white text-5xl font-black leading-none">{{ currentDeals }}</span>
        <a href="#" class="text-indigo-200 text-sm ml-1">成交台数 ›</a>
      </div>
      <div class="text-xs text-indigo-300 mt-1">最近3个月(含本月)累计成交台数</div>
    </div>

    <!-- 进度条:0 → 保级 V2(3台)→ 升级 V3(10台) -->
    <div class="px-5 pb-8">
      <div class="relative">
        <div class="h-2.5 bg-white/15 rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-amber-200 via-amber-300 to-yellow-400 rounded-full" style="width:100%"></div>
        </div>
        <div class="flex items-start justify-between mt-1.5">
          <span class="text-[11px] text-indigo-300">0</span>
          <div class="text-center absolute left-[30%] -translate-x-1/2">
            <div class="w-px h-2 bg-indigo-300/50 mx-auto"></div>
            <span class="text-[11px] text-white font-bold">3</span>
            <div class="text-[10px] text-amber-200 font-medium">保级 V2</div>
          </div>
          <div class="text-right">
            <span class="text-[11px] text-white font-bold">10</span>
            <div class="text-[10px] text-amber-200 font-medium">升级 V3</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 如何提升成交台数 -->
  <div class="px-4 -mt-4 relative z-10">
    <div class="bg-white rounded-2xl p-5 shadow-md border border-slate-100">
      <div class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-1.5">
        <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i>如何提升成交台数
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div v-for="w in dealWeights" :key="w.label" :class="['rounded-xl p-3 border', w.cls]">
          <div class="flex items-center gap-1 mb-1">
            <span class="text-xs text-slate-700 font-medium">{{ w.label }}</span>
            <span :class="['font-black text-sm', w.textCls]">{{ w.mult }}</span>
          </div>
          <div class="text-[10px] text-slate-500">{{ w.desc }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Q&A -->
  <div class="px-4 mt-5">
    <div class="text-base font-bold text-slate-800 mb-3">Q&amp;A</div>
    <div class="bg-white rounded-2xl overflow-hidden border border-slate-100 divide-y divide-slate-100">
      <div v-for="(qa, i) in qaList" :key="i">
        <div class="qa-toggle flex items-center justify-between p-4" @click="toggleQa(i)">
          <span class="text-sm font-semibold text-slate-800">{{ i + 1 }}. {{ qa.q }}</span>
          <span class="text-slate-400 text-sm transition-transform duration-300"
                :style="{ transform: openQa === i ? 'rotate(180deg)' : '' }">
            <i data-lucide="chevron-down" class="w-4 h-4"></i>
          </span>
        </div>
        <div :class="['qa-answer', { open: openQa === i }]">
          <div v-if="qa.table" class="px-4 pb-4">
            <div class="text-xs text-slate-600 leading-relaxed space-y-2 mb-3" v-html="qa.a"></div>
            <table class="w-full text-xs border border-slate-200 rounded-lg overflow-hidden">
              <thead class="bg-slate-50">
                <tr>
                  <th class="py-2 px-3 text-left text-slate-500 font-medium">等级</th>
                  <th class="py-2 px-3 text-left text-slate-500 font-medium">名称</th>
                  <th class="py-2 px-3 text-right text-slate-500 font-medium">定级门槛</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                <tr v-for="lv in CFG.levels" :key="lv.code" :class="{ 'bg-violet-50': lv.code === currentLv.code }">
                  <td :class="['py-2.5 px-3', lv.code === currentLv.code ? 'text-violet-700 font-semibold' : 'text-slate-700']">
                    {{ lv.short }}<span v-if="lv.code === currentLv.code"> (当前)</span>
                  </td>
                  <td :class="['py-2.5 px-3', lv.code === currentLv.code ? 'text-violet-700 font-semibold' : 'text-slate-700']">{{ lv.name }}</td>
                  <td :class="['py-2.5 px-3 text-right', lv.code === currentLv.code ? 'font-bold text-violet-700' : 'font-semibold text-slate-700']">{{ lvRange(lv) }}</td>
                </tr>
              </tbody>
            </table>
            <div class="text-[11px] text-slate-400 text-center mt-2">近 3 个月累计成交台数 · 满足任一条件即可</div>
          </div>
          <div v-else class="px-4 pb-4 text-xs text-slate-600 leading-relaxed space-y-2" v-html="qa.a"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script src="../shared/member-config.js"></script>
<script>
const { createApp, ref, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const CFG = window.MEMBER_CONFIG;
    const currentDeals = 12;
    const currentLv = CFG.getLevelByDeals(currentDeals);

    const openQa = ref(0);

    const dealWeights = [
      { label:'竞价成交',   mult:'×1 倍',   desc:'每成功竞得 1 台车,计 1 台成交', cls:'bg-amber-50 border-amber-100',   textCls:'text-amber-600' },
      { label:'保留价成交', mult:'×1.5 倍', desc:'以保留价直接成交,计 1.5 台',    cls:'bg-violet-50 border-violet-100', textCls:'text-violet-600' },
      { label:'批量成交',   mult:'×2 倍',   desc:'单月成交 ≥5 台,额外 ×2 加成',   cls:'bg-emerald-50 border-emerald-100', textCls:'text-emerald-600' },
      { label:'专场成交',   mult:'×1.5 倍', desc:'参与专场车源成交,计 1.5 台',    cls:'bg-sky-50 border-sky-100',       textCls:'text-sky-600' }
    ];

    const qaList = [
      { q:'等级体系介绍', table:true, a:'<p>唯普会员等级每月 1 日更新,是由用户最近 3 个自然月(不含本月)的累计成交台数决定。用户最近 3 个自然月(含本月)的累计成交台数达到更高等级门槛,即可实时升级。</p><p>每个等级可享受不同类型的权益,等级越高权益越丰富。</p>' },
      { q:'什么是成交台数?',   a:'<p>成交台数是用户最近 3 个自然月(含本月)在唯普平台完成过户或付款的车辆数量。不同成交方式对应不同的倍数系数。</p><p>特别提示:退车、退款等反向交易将冲减对应的成交台数。</p>' },
      { q:'如何累积成交台数?', a:'<p>使用唯普平台进行竞价、保留价购买、专场活动等方式成交车辆,均可累积成交台数。</p><p>成交台数以<strong>过户完成</strong>或<strong>付款完成</strong>为准,仅计算近 3 个自然月的数据。</p>' },
      { q:'唯普会员等级变化规则', a:'<p>每月 1 日,系统将根据用户上一周期(本月前最近的 3 个自然月,不含本月)的累计成交台数进行定级。</p><p>达标则等级将更新。您可在会员等级页面查看最新的等级和对应的权益。</p><p><strong>注意:</strong>本月中,若您最近 3 个自然月(含本月)累计成交台数达到更高等级的门槛,将进行实时升级。但如月底时台数不足,则可能在下月 1 日降回对应等级。</p>' },
      { q:'如何查看会员等级权益?', a:'<p>您可在会员页面通过切换等级的方式查看各等级的权益,其中未达到的等级显示为未解锁状态。</p><p>会员等级越高,可享权益越丰富。</p>' },
      { q:'会员等级有效期多久?',   a:'<p>您的会员等级会在每月 1 日进行更新,更新后的等级有效期至当月最后一日。</p>' }
    ];

    function lvRange(lv) {
      if (lv.threshold.dealsMax !== undefined && lv.threshold.dealsMax > 0) return lv.threshold.dealsMin + '-' + lv.threshold.dealsMax + ' 台';
      if (lv.threshold.dealsMin === 0 && lv.threshold.dealsMax === 0) return '0 台';
      return '≥ ' + lv.threshold.dealsMin + ' 台';
    }

    function toggleQa(i) {
      openQa.value = openQa.value === i ? -1 : i;
      nextTick(() => window.lucide && lucide.createIcons());
    }

    function back() { smartBack('member.html'); }

    onMounted(() => lucide.createIcons());

    return { CFG, currentLv, currentDeals, openQa, dealWeights, qaList, lvRange, toggleQa, back };
  }
}).mount('#app');
</script>
</body>
</html>
