<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>会员中心 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a0e3d; color: #1e293b; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }

  .hero-bg {
    background:
      radial-gradient(ellipse at top left, #8b5cf6 0%, transparent 50%),
      radial-gradient(ellipse at top right, #6366f1 0%, transparent 50%),
      linear-gradient(180deg, #2e1065 0%, #1e1b4b 60%, #f8fafc 100%);
  }
  .lv-text {
    background: linear-gradient(180deg, #fff 0%, #e0e7ff 50%, #a5b4fc 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 900; letter-spacing: -2px;
  }
  .card-shine { background: linear-gradient(135deg, #5b3fd9 0%, #8b5cf6 100%); }
  .lv-preview-bg { background: linear-gradient(180deg, #ede9fe 0%, #f5f3ff 40%, #ffffff 100%); }

  /* 权益网格项 */
  .ben-cell { text-align: center; }
  .ben-ic {
    margin: 0 auto; width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(139,92,246,.12), rgba(99,102,241,.08));
    color: #7c3aed;
  }
  .ben-label { font-size: 11px; font-weight: 600; margin-top: 6px; color: #334155; line-height: 1.3; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <!-- Hero -->
  <div class="hero-bg pt-2">
    <div class="flex items-center justify-between px-5 py-2 text-white text-sm">
      <span>19:50</span>
      <span class="flex items-center gap-1">
        <i data-lucide="bell" class="w-3 h-3"></i>
        <i data-lucide="wifi" class="w-3 h-3"></i>
        <i data-lucide="battery-full" class="w-3 h-3"></i>
        <span class="text-xs">85%</span>
      </span>
    </div>
    <div class="flex items-center justify-between px-5 pb-3">
      <button type="button" @click="back" class="text-white cursor-pointer"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
      <span class="text-white text-base font-semibold">会员中心</span>
      <a href="landing.html" class="text-white/90 flex items-center text-xs gap-0.5">权益介绍 <i data-lucide="chevron-right" class="w-3 h-3"></i></a>
    </div>

    <!-- Hero 大等级 + 进度 -->
    <div class="px-6 pb-8 flex items-end gap-6">
      <div class="flex-none"><div class="lv-text text-[96px] leading-none">{{ selectedLv.short }}</div></div>
      <div class="flex-1 text-white pb-3">
        <div class="text-xs text-indigo-200" v-html="heroMain"></div>
        <div class="mt-2 h-1.5 bg-white/10 rounded-full overflow-hidden max-w-[160px]">
          <div class="h-full bg-gradient-to-r from-amber-300 to-yellow-400 transition-all duration-300" :style="{ width: heroProgress + '%' }"></div>
        </div>
        <div class="text-[11px] mt-2 text-indigo-200">{{ heroDate }}</div>
      </div>
    </div>
  </div>

  <!-- 我的积分 -->
  <div class="px-4 -mt-4 relative z-10">
    <div class="card-shine rounded-2xl p-4 text-white shadow-xl">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2">
          <i data-lucide="coins" class="w-4 h-4 text-amber-300"></i>
          <span class="text-sm font-bold">我的积分</span>
        </div>
        <div class="flex items-center gap-3 text-xs">
          <a href="landing.html" class="flex items-center opacity-90 hover:opacity-100">
            <i data-lucide="help-circle" class="w-3 h-3 mr-0.5"></i>积分怎么拿
          </a>
          <span class="w-px h-3 bg-white/30"></span>
          <a href="coins.html" class="opacity-90 flex items-center">明细 <i data-lucide="chevron-right" class="w-3 h-3"></i></a>
        </div>
      </div>
      <div class="flex items-end justify-between mt-2">
        <div>
          <div class="text-3xl font-bold tracking-tight">356</div>
          <div class="text-[11px] opacity-75 mt-0.5">30 天内 <span class="text-amber-300 font-semibold">50 积分</span> 即将过期</div>
        </div>
        <a href="mall.html" class="px-4 py-2 bg-white/20 backdrop-blur rounded-full text-xs font-medium">立即兑换</a>
      </div>
    </div>
  </div>

  <!-- 可享权益 + 推荐任务 -->
  <div class="pb-24 lv-preview-bg pt-5">

    <!-- 可享权益 标题 -->
    <div class="flex items-center justify-center gap-3 px-6">
      <span class="w-1 h-1 bg-violet-300 rounded-full"></span>
      <div class="text-[13px] font-bold text-slate-700">可享权益</div>
      <span class="w-1 h-1 bg-violet-300 rounded-full"></span>
    </div>

    <!-- 权益网格(基于当前等级 benefits) -->
    <div v-if="(currentLv.benefits || []).length" class="px-4 mt-5 grid grid-cols-4 gap-y-5 gap-x-2">
      <div v-for="b in currentLv.benefits" :key="b.id" class="ben-cell">
        <div class="ben-ic"><i :data-lucide="b.icon" class="w-6 h-6"></i></div>
        <div class="ben-label">{{ b.label }}</div>
      </div>
    </div>
    <div v-else class="px-6 mt-5 text-center">
      <div class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white border border-slate-100 shadow-sm text-[13px] text-slate-500">
        <i data-lucide="gift" class="w-4 h-4 text-violet-400"></i>
        当前等级暂无专属权益,
        <a href="landing.html" class="text-violet-600 font-semibold">了解升级方式</a>
      </div>
    </div>

    <!-- 推荐任务 -->
    <div class="px-4 mt-7">
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-4 pt-4 pb-1 flex items-center justify-between">
          <span class="text-base font-bold text-slate-800">推荐任务</span>
          <span class="text-[11px] text-slate-400">完成任务获积分</span>
        </div>
        <div class="divide-y divide-slate-100">
          <div v-for="t in CFG.recommendedTasks" :key="t.id" class="px-4 py-3.5 flex items-start gap-3">
            <div class="flex-1 min-w-0">
              <div class="text-[15px] font-bold text-slate-800 leading-snug">{{ t.action }}</div>
              <div class="flex items-center flex-wrap gap-x-3 gap-y-0.5 mt-1.5 text-xs text-slate-400">
                <span class="whitespace-nowrap">积分 <span :class="['font-bold', t.highlight ? 'text-rose-500' : 'text-violet-600']">+{{ t.points }}{{ t.unit }}</span></span>
                <span v-if="t.desc" class="truncate">{{ t.desc }}</span>
              </div>
            </div>
            <button class="flex-none px-4 py-1.5 bg-gradient-to-r from-violet-500 to-indigo-500 text-white text-xs font-bold rounded-full whitespace-nowrap shadow-sm">
              去完成
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部导航 -->
  <div class="sticky bottom-0 bg-white border-t border-slate-100 px-2 py-2 grid grid-cols-5 text-[11px] text-slate-500 z-30">
    <a href="home.html" class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="home" class="w-5 h-5"></i>首页</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="car" class="w-5 h-5"></i>全部车源</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="target" class="w-5 h-5"></i>专场</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="heart" class="w-5 h-5"></i>关注</a>
    <a class="flex flex-col items-center gap-0.5 py-1 text-violet-600 font-semibold"><i data-lucide="crown" class="w-5 h-5"></i>会员</a>
  </div>

</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>

<!-- 模拟用户等级 · 仅 Demo -->
<div class="hidden md:block fixed top-4 right-4 z-50">
  <div class="bg-white rounded-xl shadow-lg px-3 py-2.5 border border-slate-200">
    <div class="text-[11px] text-slate-400 mb-2 flex items-center gap-1.5">
      <i data-lucide="users" class="w-3 h-3"></i><span>模拟用户身份</span>
    </div>
    <div class="flex flex-col gap-1.5">
      <button v-for="lv in CFG.levels" :key="lv.code"
              @click="simulateLevel(lv.short)"
              :class="['px-3 py-1.5 rounded-lg text-xs font-bold text-white transition-all min-w-[88px] text-left', currentLv.code === lv.code ? 'ring-2 ring-offset-1 ring-violet-400 scale-105' : 'opacity-80 hover:opacity-100']"
              :style="{ background: 'linear-gradient(135deg,' + lv.gradient[0] + ',' + lv.gradient[1] + ')' }">
        {{ lv.short }} · {{ lv.name }}
      </button>
    </div>
    <div class="text-[10px] text-slate-400 mt-2 leading-tight">近 3 月成交 <b class="text-slate-600">{{ currentDeals }}</b> 台</div>
  </div>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script src="../shared/member-config.js"></script>
<script>
const { createApp, ref, computed, watch, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const CFG = window.MEMBER_CONFIG;
    const DEALS_PRESET = { V0: 0, V1: 2, V2: 6, V3: 12 };
    const currentDeals = ref(12);
    const currentLv = computed(() => CFG.getLevelByDeals(currentDeals.value));
    const currentIdx = computed(() => CFG.levels.indexOf(currentLv.value));
    const selectedIdx = ref(currentIdx.value);
    const selectedLv = computed(() => CFG.levels[selectedIdx.value]);

    function simulateLevel(short) {
      currentDeals.value = DEALS_PRESET[short] ?? 0;
      selectedIdx.value = currentIdx.value;
    }

    const heroDate = computed(() => {
      const idx = selectedIdx.value, lv = selectedLv.value, cur = currentIdx.value;
      if (idx === cur) return lv.name + ' · 有效期至 2026-06-30';
      if (idx < cur)   return '您已超越该等级 · ' + lv.name;
      return '暂未达到 · ' + lv.name;
    });
    const heroMain = computed(() => {
      const idx = selectedIdx.value, lv = selectedLv.value, cur = currentIdx.value, deals = currentDeals.value;
      const bold = (s) => '<span class="text-white font-semibold">' + s + '</span>';
      const base = '近 3 月成交 ' + bold(deals + ' 台');
      if (idx === cur) {
        const next = CFG.levels[idx + 1];
        if (!next) return base;
        const need = Math.max(0, next.threshold.dealsMin - deals);
        return base + ',还需 ' + bold(need + ' 台') + ' 升 ' + bold(next.short);
      }
      if (idx < cur) return bold(lv.name) + ' · 权益已自动升级';
      const need = Math.max(0, (lv.threshold.dealsMin || 0) - deals);
      return base + ',还需 ' + bold(need + ' 台') + ' 升 ' + bold(lv.short);
    });
    const heroProgress = computed(() => {
      const idx = selectedIdx.value, lv = selectedLv.value, cur = currentIdx.value, deals = currentDeals.value;
      if (idx === cur) {
        const next = CFG.levels[idx + 1];
        return next ? Math.min(100, Math.round(deals / next.threshold.dealsMin * 100)) : 100;
      }
      if (idx < cur) return 100;
      return Math.min(100, Math.round(deals / lv.threshold.dealsMin * 100));
    });

    function back() { smartBack('profile-loggedin.html'); }

    watch([currentDeals, selectedIdx], () => nextTick(() => window.lucide && lucide.createIcons()));
    onMounted(() => lucide.createIcons());

    return {
      CFG, currentLv, currentDeals,
      selectedLv, heroDate, heroMain, heroProgress,
      simulateLevel, back
    };
  }
}).mount('#app');
</script>
</body>
</html>
