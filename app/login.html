<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>登录 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="../shared/reserve-cars.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f0f0; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }
  .login-tab { padding: 8px 0; font-size: 18px; font-weight: bold; color: #94a3b8; position: relative; cursor: pointer; }
  .login-tab.active { color: #1e293b; }
  .login-tab.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 20%; height: 3px; background: #ef4444; border-radius: 2px; }
  .captcha-img { background: repeating-linear-gradient(45deg, #f1f5f9, #f1f5f9 4px, #e2e8f0 4px, #e2e8f0 8px); font-family: 'Georgia', serif; font-style: italic; letter-spacing: 3px; color: #64748b; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <div class="flex items-center justify-between px-5 py-2 text-slate-800 text-sm">
    <span>9:41</span>
    <span class="flex items-center gap-1"><i data-lucide="signal" class="w-3.5 h-3.5"></i><i data-lucide="wifi" class="w-3.5 h-3.5"></i><i data-lucide="battery-full" class="w-3.5 h-3.5"></i></span>
  </div>

  <div class="px-5 py-4">
    <button type="button" @click="back" class="text-slate-800"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
  </div>

  <div class="px-6 mb-8 flex items-center gap-8">
    <span :class="['login-tab', { active: tab === 0 }]" @click="tab = 0">手机号登录</span>
    <span class="text-slate-200 text-2xl">|</span>
    <span :class="['login-tab', { active: tab === 1 }]" @click="tab = 1">用户名登录</span>
  </div>

  <div class="px-6 space-y-5">
    <!-- 手机号登录 -->
    <div v-show="tab === 0" class="border-b border-slate-200 pb-3 flex items-center gap-2">
      <i data-lucide="smartphone" class="w-4 h-4 text-slate-400"></i>
      <input v-model="phone" class="flex-1 text-sm outline-none placeholder-slate-400" placeholder="请输入手机号码" type="tel">
      <button class="w-6 h-6 rounded-full bg-sky-500 text-white text-[10px] flex items-center justify-center">文<sub>A</sub></button>
    </div>

    <!-- 用户名登录 -->
    <div v-show="tab === 1" class="border-b border-slate-200 pb-3 flex items-center gap-2">
      <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
      <input v-model="username" class="flex-1 text-sm outline-none placeholder-slate-400" placeholder="请输入用户名" type="text">
    </div>
    <div v-show="tab === 1" class="border-b border-slate-200 pb-3 flex items-center gap-2">
      <i data-lucide="lock" class="w-4 h-4 text-slate-400"></i>
      <input v-model="password" class="flex-1 text-sm outline-none placeholder-slate-400" placeholder="请输入密码" type="password">
    </div>

    <!-- 图形验证码(仅手机登录) -->
    <div v-show="tab === 0" class="border-b border-slate-200 pb-3 flex items-center gap-2">
      <i data-lucide="message-square" class="w-4 h-4 text-slate-400"></i>
      <input v-model="captcha" class="flex-1 text-sm outline-none placeholder-slate-400" placeholder="请输入图形验证码" type="text">
      <div class="captcha-img px-4 py-1.5 text-base font-bold rounded">76py</div>
    </div>

    <!-- 短信验证码(仅手机登录) -->
    <div v-show="tab === 0" class="border-b border-slate-200 pb-3 flex items-center gap-2">
      <i data-lucide="message-square" class="w-4 h-4 text-slate-400"></i>
      <input v-model="sms" class="flex-1 text-sm outline-none placeholder-slate-400" placeholder="请输入验证码" type="text">
      <button @click="sendCode" :disabled="countdown > 0" :class="['text-sm font-bold text-slate-800', countdown > 0 ? 'opacity-50' : '']">
        {{ countdown > 0 ? '已发送 (' + countdown + 's)' : '获取验证码' }}
      </button>
    </div>
  </div>

  <div class="px-6 mt-4">
    <button @click="fillMock" class="w-full py-2 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700 font-medium flex items-center justify-center gap-1.5">
      <i data-lucide="wrench" class="w-3.5 h-3.5"></i>一键填充测试数据(Demo 用)
    </button>
  </div>

  <div class="px-6 mt-8">
    <button @click="doLogin" class="block w-full py-3.5 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-full text-center text-base font-bold shadow-lg">登录</button>
    <div class="text-center text-xs text-slate-400 mt-3">{{ tab === 0 ? '未注册手机验证后自动登录' : '使用用户名和密码登录' }}</div>
  </div>

  <!-- Demo · 切换会员等级登录 -->
  <div class="mx-6 mt-4 bg-slate-50 border border-slate-200 rounded-xl p-3">
    <div class="text-[11px] text-slate-500 mb-2 flex items-center gap-1">
      <i data-lucide="flask-conical" class="w-3 h-3"></i>Demo · 选择测试身份登录
    </div>
    <div class="grid grid-cols-4 gap-2">
      <button v-for="lv in ['V0','V1','V2','V3']" :key="lv" @click="loginAs(lv)"
              class="py-1.5 rounded-lg border border-slate-200 bg-white text-[12px] text-slate-700 active:bg-slate-100">
        {{ lv }}
      </button>
    </div>
  </div>

  <div class="px-6 mt-6 flex items-start gap-2">
    <input v-model="agreed" type="checkbox" class="mt-0.5 accent-red-500">
    <span class="text-xs text-slate-500">我已阅读并同意<a class="text-sky-500">"用户协议"</a>及<a class="text-sky-500">"隐私政策"</a></span>
  </div>

  <div style="min-height:180px"></div>

  <div class="sticky bottom-0 bg-white border-t border-slate-100 px-2 py-2 grid grid-cols-4 text-[11px] text-slate-500">
    <a href="home.html" class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="home" class="w-5 h-5"></i>首页</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="car" class="w-5 h-5"></i>全部车源</a>
    <a class="flex flex-col items-center gap-0.5 py-1"><i data-lucide="target" class="w-5 h-5"></i>专场车源</a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 py-1 text-red-500 font-semibold"><i data-lucide="user" class="w-5 h-5"></i>个人中心</a>
  </div>

</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script>
const { createApp, ref, onMounted, onUnmounted } = Vue;

createApp({
  setup() {
    const tab = ref(0);
    const phone = ref('');
    const captcha = ref('');
    const sms = ref('');
    const username = ref('');
    const password = ref('');
    const agreed = ref(true);
    const countdown = ref(0);
    let timer = null;

    function sendCode() {
      if (countdown.value > 0) return;
      countdown.value = 59;
      timer = setInterval(() => {
        countdown.value--;
        if (countdown.value <= 0) { clearInterval(timer); timer = null; }
      }, 1000);
    }

    function fillMock() {
      phone.value = '138****2841';
      sms.value = '8888';
    }

    function back() { smartBack('profile.html'); }

    function getReturnUrl() {
      const p = new URLSearchParams(location.search);
      return p.get('from') || 'profile-loggedin.html';
    }
    function doLogin() {
      window.VPUser && window.VPUser.set('V0');
      location.href = getReturnUrl();
    }
    function loginAs(level) {
      window.VPUser && window.VPUser.set(level);
      location.href = getReturnUrl();
    }

    onMounted(() => lucide.createIcons());
    onUnmounted(() => { if (timer) clearInterval(timer); });

    return { tab, phone, captcha, sms, username, password, agreed, countdown, sendCode, fillMock, back, doLogin, loginAs };
  }
}).mount('#app');
</script>
</body>
</html>
