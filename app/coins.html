<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>金币明细 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a0e3d; }
  .phone-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #f8fafc; position: relative; }
  @media (min-width: 768px) { body { background: #f5f5f7; padding: 24px 0; } .phone-shell { border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; } }
  [v-cloak] { display:none; }
  .hero-bg { background: linear-gradient(180deg, #2e1065 0%, #4c1d95 60%, #f8fafc 100%); }
  .tab.active { color: #8b5cf6; font-weight: 600; position: relative; }
  .tab.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: #8b5cf6; border-radius: 3px; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="phone-shell">

  <div class="hero-bg pt-2">
    <div class="flex items-center justify-between px-5 py-2 text-white text-sm">
      <span>19:50</span>
      <span class="flex items-center gap-1"><i data-lucide="bell" class="w-3 h-3"></i><i data-lucide="wifi" class="w-3 h-3"></i><i data-lucide="battery-full" class="w-3 h-3"></i><span class="text-xs">85%</span></span>
    </div>
    <div class="flex items-center justify-between px-5 pb-3">
      <button type="button" @click="back" class="text-white cursor-pointer"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
      <span class="text-white text-base font-semibold">金币明细</span>
      <button @click="showRuleModal = true" class="text-white text-xs">规则说明</button>
    </div>

    <!-- 余额概览 -->
    <div class="px-5 pb-8 text-white">
      <div class="text-xs opacity-80 mb-1">金币余额</div>
      <div class="text-5xl font-bold tracking-tight mb-3">356</div>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div class="bg-white/10 backdrop-blur rounded-xl py-2.5 border border-white/10">
          <div class="text-lg font-bold">1,280</div>
          <div class="text-[10px] opacity-80">历史累计</div>
        </div>
        <div class="bg-white/10 backdrop-blur rounded-xl py-2.5 border border-white/10">
          <div class="text-lg font-bold">924</div>
          <div class="text-[10px] opacity-80">已使用</div>
        </div>
        <div class="bg-amber-400/20 backdrop-blur rounded-xl py-2.5 border border-amber-300/30">
          <div class="text-lg font-bold text-amber-200">50</div>
          <div class="text-[10px] text-amber-200">30天内过期</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 即将过期提醒 -->
  <div class="px-4 -mt-4 relative z-10 mb-4">
    <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-4 flex items-center gap-3">
      <i data-lucide="alarm-clock" class="w-6 h-6 text-amber-600"></i>
      <div class="flex-1">
        <div class="text-sm font-semibold text-amber-900">50 金币将在 15 天内过期</div>
        <div class="text-xs text-amber-700 mt-0.5">赶快去商城兑换吧!</div>
      </div>
      <a href="mall.html" class="px-3 py-1.5 bg-amber-500 text-white rounded-full text-xs font-medium">去兑换</a>
    </div>
  </div>

  <!-- Tabs -->
  <div class="px-4 bg-white border-b border-slate-100">
    <div class="flex gap-6 py-3 text-sm text-slate-600 overflow-x-auto">
      <span v-for="t in filterTabs" :key="t.key" :class="['tab', { active: activeFilter === t.key }]" @click="activeFilter = t.key">{{ t.label }}</span>
    </div>
  </div>

  <!-- 时间分组 -->
  <div class="px-4 pt-4 pb-24">
    <template v-for="group in visibleGroups" :key="group.date">
      <div class="text-xs text-slate-400 py-2 font-medium">{{ group.date }}</div>
      <div class="bg-white rounded-2xl overflow-hidden shadow-sm mb-3">
        <div v-for="(tx, i) in group.items" :key="i"
             :class="['flex items-center gap-3 p-4', i < group.items.length - 1 ? 'border-b border-slate-50' : '']">
          <div :class="['w-10 h-10 rounded-xl flex items-center justify-center text-white', tx.iconBg]">
            <i :data-lucide="tx.icon" class="w-5 h-5"></i>
          </div>
          <div class="flex-1">
            <div class="text-sm font-medium text-slate-800">{{ tx.title }}</div>
            <div class="text-xs text-slate-400 mt-0.5">{{ tx.meta }}</div>
          </div>
          <div class="text-right">
            <div :class="['text-base font-bold', tx.amountColor]">{{ tx.amount }}</div>
            <div class="text-[10px] text-slate-400">{{ tx.note }}</div>
          </div>
        </div>
      </div>
    </template>

    <div class="text-center text-xs text-slate-400 py-4">— 查看更多 —</div>
  </div>

</div>

<!-- 规则说明弹窗 -->
<div v-if="showRuleModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,.55);backdrop-filter:blur(3px)" @click.self="showRuleModal = false">
  <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
    <div class="bg-gradient-to-r from-violet-600 to-indigo-600 p-4 text-white flex items-center justify-between">
      <div class="flex items-center gap-2"><i data-lucide="book-open" class="w-5 h-5"></i><span class="text-base font-bold">唯金币获取规则</span></div>
      <button @click="showRuleModal = false" class="text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="p-4 max-h-[72vh] overflow-y-auto">
      <div class="mb-3 p-3 bg-amber-50 border border-amber-100 rounded-lg text-xs text-amber-800">
        <strong>1 金币 ≈ {{ CFG.coin.unitYuan }} 元</strong>,可用于兑换平台权益卡
      </div>
      <div class="overflow-x-auto rounded-lg border border-slate-200">
        <table class="w-full text-[11px] text-left border-collapse">
          <thead class="bg-slate-50 text-slate-600">
            <tr>
              <th class="py-2 px-2 font-semibold text-left">具体行为</th>
              <th class="py-2 px-2 font-semibold text-center whitespace-nowrap">唯金币值</th>
              <th class="py-2 px-2 font-semibold text-left">规则说明</th>
            </tr>
          </thead>
          <tbody class="bg-white">
            <tr v-for="it in allEarningItems" :key="it.action" class="border-t border-slate-100 align-top">
              <td class="py-2 px-2 text-slate-800 font-medium leading-snug">{{ it.action }}</td>
              <td class="py-2 px-2 text-center whitespace-nowrap">
                <div class="text-sm font-bold text-amber-600">+{{ it.coin }}</div>
                <div class="text-[9px] text-slate-400">{{ it.unit }}</div>
              </td>
              <td class="py-2 px-2 text-slate-500 leading-snug">{{ it.desc || '—' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="mt-3 p-3 bg-slate-900 text-white rounded-lg text-xs">
        <div class="font-semibold mb-1 flex items-center gap-1.5"><i data-lucide="hourglass" class="w-3.5 h-3.5"></i>金币有效期</div>
        <div class="text-slate-300 leading-relaxed">{{ CFG.coin.validityDesc }},到期自动清零</div>
      </div>
    </div>
    <div class="p-3 border-t border-slate-100">
      <button @click="showRuleModal = false" class="w-full py-2.5 bg-gradient-to-r from-violet-600 to-indigo-600 text-white rounded-full text-sm font-bold">我知道了</button>
    </div>
  </div>
</div>

<div class="hidden md:block fixed top-4 left-4 z-50">
  <a href="../index.html" class="px-4 py-2 bg-white rounded-full shadow-lg text-sm text-slate-700 hover:bg-slate-50">← 返回 Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_smart-back.js"></script>
<script src="../shared/member-config.js"></script>
<script>
const { createApp, ref, computed, watch, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const CFG = window.MEMBER_CONFIG;
    const activeFilter = ref('all');
    const showRuleModal = ref(false);

    const filterTabs = [
      { key:'all',    label:'全部' },
      { key:'earn',   label:'获取' },
      { key:'spend',  label:'消耗' },
      { key:'expire', label:'过期' }
    ];

    const EARN_TYPES = ['deal','bid','share','invite','verify','vote','service','festival','weichezhuan'];

    const groups = [
      { date:'今天 · 2026-04-15', items:[
        { type:'deal',  title:'成交奖励',       meta:'车源 XC2045 · 11:23', amount:'+50',  amountColor:'text-emerald-600', note:'有效期至 2027-04-15', icon:'wallet',    iconBg:'bg-gradient-to-br from-emerald-400 to-teal-500' },
        { type:'share', title:'转发朋友圈',     meta:'车源 XC2103 · 09:45', amount:'+1',   amountColor:'text-violet-600',  note:'有效期至 2027-04-15', icon:'megaphone', iconBg:'bg-gradient-to-br from-violet-400 to-purple-500' },
        { type:'bid',   title:'有效出价',       meta:'车源 XC2103 · 09:40', amount:'+10',  amountColor:'text-sky-600',     note:'有效期至 2027-04-15', icon:'gavel',     iconBg:'bg-gradient-to-br from-sky-400 to-blue-500' }
      ]},
      { date:'昨天 · 2026-04-14', items:[
        { type:'spend',  title:'兑换权益',       meta:'车辆中标价查询卡 · 15:10', amount:'-200', amountColor:'text-rose-600',    note:'余额 306',           icon:'gift',     iconBg:'bg-gradient-to-br from-rose-400 to-pink-500' },
        { type:'deal',   title:'成交奖励',       meta:'车源 XC2038 · 14:30',      amount:'+50',  amountColor:'text-emerald-600', note:'有效期至 2027-04-14', icon:'wallet',   iconBg:'bg-gradient-to-br from-emerald-400 to-teal-500' },
        { type:'bid',    title:'有效出价 × 3',   meta:'3 辆不同车源 · 10 金币/台', amount:'+30',  amountColor:'text-sky-600',     note:'已合并展示',         icon:'gavel',    iconBg:'bg-gradient-to-br from-sky-400 to-blue-500' },
        { type:'service',title:'使用平台物流服务',meta:'车源 XC2038 · 11:05',      amount:'+5',   amountColor:'text-amber-600',   note:'有效期至 2027-04-14', icon:'truck',    iconBg:'bg-gradient-to-br from-amber-400 to-orange-500' }
      ]},
      { date:'2026-04-10', items:[
        { type:'expire', title:'金币过期清零',      meta:'2025-04-10 获得 · 满 12 月', amount:'-12', amountColor:'text-slate-500',   note:'余额 369',           icon:'hourglass',  iconBg:'bg-gradient-to-br from-slate-400 to-slate-500' },
        { type:'deal',   title:'成交奖励',          meta:'车源 XC1998 · 10:22',        amount:'+50', amountColor:'text-emerald-600', note:'有效期至 2027-04-10', icon:'wallet',     iconBg:'bg-gradient-to-br from-emerald-400 to-teal-500' },
        { type:'invite', title:'邀请好友开通会员',  meta:'好友 138****6621 · 09:18',   amount:'+2',  amountColor:'text-fuchsia-600', note:'有效期至 2027-04-10', icon:'user-plus',  iconBg:'bg-gradient-to-br from-fuchsia-400 to-pink-500' }
      ]}
    ];

    const visibleGroups = computed(() => {
      if (activeFilter.value === 'all') return groups;
      return groups
        .map(g => ({
          ...g,
          items: g.items.filter(tx => {
            if (activeFilter.value === 'earn') return EARN_TYPES.includes(tx.type);
            return tx.type === activeFilter.value;
          })
        }))
        .filter(g => g.items.length > 0);
    });

    const allEarningItems = CFG ? CFG.coinEarning.reduce((acc, g) => acc.concat(g.items), []) : [];

    function back() { smartBack('member.html'); }

    watch([activeFilter, showRuleModal], () => nextTick(() => window.lucide && lucide.createIcons()));
    onMounted(() => lucide.createIcons());

    return { CFG, activeFilter, filterTabs, visibleGroups, allEarningItems, showRuleModal, back };
  }
}).mount('#app');
</script>
</body>
</html>
