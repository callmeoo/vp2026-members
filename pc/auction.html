<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唯普汽车 · 竞价大厅</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="common.css">
<script src="_partials.js"></script>
</head>
<body>
<div id="app" v-cloak>
  <div v-html="header"></div>

  <div class="pc-main">
    <!-- 场次 -->
    <div class="pc-section-tabs">
      <div v-for="t in scenes" :key="t.key" class="pc-tab" :class="{ active: scene === t.key }" @click="scene = t.key">{{ t.label }}</div>
    </div>

    <!-- 时间 -->
    <div class="pc-section-tabs" style="margin-bottom: 0;">
      <div v-for="t in times" :key="t" class="pc-tab" :class="{ active: time === t }" @click="time = t" style="padding: 8px 22px; font-size: 13px;">{{ t }}</div>
    </div>

    <!-- 筛选 -->
    <div class="filter-card" style="margin-top: 14px;">
      <div class="filter-row">
        <div class="filter-label">品牌:</div>
        <div class="filter-chips">
          <span class="chip" :class="{ active: brand === '热门' }" @click="brand = '热门'">热门</span>
          <span v-for="l in brandLetters" :key="l" class="chip" :class="{ active: brand === l }" @click="brand = l">{{ l }}</span>
        </div>
      </div>
      <div class="filter-row" style="border-top: none; padding-top: 0;">
        <div class="filter-label"></div>
        <div class="filter-chips">
          <span class="chip" :class="{ active: brandPick === '不限' }" @click="brandPick = '不限'">不限</span>
          <span v-for="b in brandHot" :key="b" class="chip" :class="{ active: brandPick === b }" @click="brandPick = b">{{ b }}</span>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">价格:</div>
        <div class="filter-chips">
          <span class="chip" :class="{ active: price === '不限' }" @click="price = '不限'">不限</span>
          <span v-for="p in priceRanges" :key="p" class="chip" :class="{ active: price === p }" @click="price = p">{{ p }}</span>
          <input class="range-input" placeholder="" /> <span class="text-slate-400 text-xs">万</span>
          <span class="text-slate-400">-</span>
          <input class="range-input" placeholder="" /> <span class="text-slate-400 text-xs">万</span>
          <button class="confirm-btn">确定</button>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">车源地:</div>
        <div class="filter-chips">
          <span class="chip" :class="{ active: region === '不限' }" @click="region = '不限'">不限</span>
          <span v-for="r in regions" :key="r" class="chip" :class="{ active: region === r }" @click="region = r">{{ r }}</span>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">更多:</div>
        <div class="filter-chips">
          <select v-for="m in moreFilters" :key="m.key" class="more-select"><option>{{ m.label }}</option></select>
        </div>
      </div>
      <div class="filter-foot">
        <div>当前筛选: <span class="text-slate-400" style="border:1px solid #e2e8f0; padding: 1px 14px; margin: 0 8px;">空</span> <span class="reset">重置条件</span></div>
        <div class="right-links">
          <a>竞价须知 ›</a>
          <a>充值保证金 ›</a>
        </div>
      </div>
    </div>

    <!-- 列表 toolbar -->
    <div class="list-toolbar">
      <div class="list-tabs">
        <div v-for="t in listTabs" :key="t" class="list-tab" :class="{ active: listTab === t }" @click="listTab = t">{{ t }}</div>
      </div>
      <div class="list-sort">
        <span class="sort-item active">默认排序<i data-lucide="arrow-up" class="w-3 h-3"></i></span>
        <span class="sort-item">上牌时间<i data-lucide="arrow-down" class="w-3 h-3"></i></span>
        <span class="sort-item">竞价价格<i data-lucide="arrow-down" class="w-3 h-3"></i></span>
      </div>
    </div>

    <!-- 列表 -->
    <div class="car-grid">
      <a v-for="c in cars" :key="c.id" class="car-card" href="#">
        <div class="car-img">
          <span v-if="c.pro" class="badge-pro">专业<br>检测</span>
          <img :src="c.img" :alt="c.title" loading="lazy" class="w-full h-full object-cover">
        </div>
        <div class="status-bar">
          <span>{{ c.status }}</span><span>{{ c.score }}</span>
        </div>
        <div class="car-body">
          <div class="car-title"><i data-lucide="map-pin" class="pin w-3.5 h-3.5 inline -mt-0.5"></i>{{ c.title }}</div>
          <div class="car-meta">{{ c.plate }} | {{ c.date }} | {{ c.km }} <span v-if="c.pass"> | {{ c.pass }}</span></div>
          <div class="car-tags">
            <span v-for="t in c.tags" :key="t" class="car-tag" :class="{ energy: t==='新能源', reserved: t==='有保留价', new: t==='上新', scrap: t==='报废车专场', discount: t==='降价' }">{{ t }}</span>
          </div>
          <div class="car-price">
            <div class="price-num">¥<strong>{{ c.price }}</strong> 万起</div>
            <div class="car-time">{{ c.endIn }}</div>
          </div>
        </div>
      </a>
    </div>

    <!-- 分页 -->
    <div class="pc-pagination">
      <span class="page-item" disabled>‹</span>
      <span class="page-item active">1</span>
      <span class="page-item">2</span>
      <span class="page-item">3</span>
      <span class="page-item">4</span>
      <span class="page-item">5</span>
      <span class="page-item">›</span>
    </div>
  </div>

  <div v-html="footer"></div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const { createApp, ref, onMounted, watch, nextTick } = Vue;
  createApp({
    setup() {
      const header = PC_COMMON.renderHeader('auction');
      const footer = PC_COMMON.renderFooter();

      const scenes = [
        { key: 'hall',     label: '大厅车源' },
        { key: 'today',    label: '今日场' },
        { key: 'tomorrow', label: '明日场' },
        { key: 'fri',      label: '05.01周五' },
        { key: 'other',    label: '其他场次' },
      ];
      const scene = ref('today');
      const times = ['全部','14:00结束','14:30结束','15:00结束','15:30结束','17:00结束','18:00结束'];
      const time = ref('全部');

      const brand = ref('热门');
      const brandPick = ref('不限');
      const price = ref('不限');
      const region = ref('不限');

      const listTabs = ['全部竞价车辆','未出价车辆','已出价车辆'];
      const listTab = ref('全部竞价车辆');

      const cars = PC_COMMON.cars.slice(0, 8);

      const refresh = () => nextTick(() => window.lucide && lucide.createIcons());
      watch([scene, time, brand, brandPick, price, region, listTab], refresh);
      onMounted(refresh);

      return {
        header, footer, scenes, scene, times, time,
        brand, brandPick, price, region,
        brandLetters: PC_COMMON.brandLetters,
        brandHot:     PC_COMMON.brandHot,
        priceRanges:  PC_COMMON.priceRanges,
        regions:      PC_COMMON.regions,
        moreFilters:  PC_COMMON.moreFilters,
        listTabs, listTab, cars,
      };
    },
  }).mount('#app');
</script>
</body>
</html>
