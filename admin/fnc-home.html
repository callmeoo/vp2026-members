<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页 · 财务管理 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; color: #303133; font-size: 13px; }
  [v-cloak] { display:none; }

  .ant-sider { background: #304156; width: 200px; flex: 0 0 200px; color: #bfcbd9; }
  .ant-sider .logo { background: #263445; }
  .ant-sider .brand-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
  .ant-sider .brand-sub { color: #8492a6; font-size: 10px; margin-top: 2px; letter-spacing: 1px; }
  .ant-sider .sys-label { padding: 10px 20px 6px; font-size: 11px; color: #8492a6; letter-spacing: 1px; font-weight: 600; }
  .ant-sider .menu-item { display: flex; align-items: center; gap: 10px; padding: 0 20px; height: 44px; color: #bfcbd9; font-size: 13px; cursor: pointer; }
  .ant-sider .menu-item:hover { background: #263445; color: #fff; }
  .ant-sider .menu-item.open { background: #1f2d3d; color: #fff; }
  .ant-sider .menu-item i.chevron { margin-left: auto; transition: transform .2s; }
  .ant-sider .menu-item.open i.chevron { transform: rotate(90deg); }
  .ant-sider .submenu { background: #1f2d3d; }
  .ant-sider .submenu .sub-item { display: flex; align-items: center; height: 40px; padding-left: 50px; color: #bfcbd9; font-size: 13px; cursor: pointer; text-decoration: none; }
  .ant-sider .submenu .sub-item:hover { color: #fff; background: #001528; }
  .ant-sider .submenu .sub-item.active { color: #409eff; background: #263445; }

  .ant-header { height: 50px; background: #fff; border-bottom: 1px solid #e4e7ed; }
  .breadcrumb-current { color: #303133; font-weight: 500; }
  .ant-card { background: #fff; border-radius: 2px; padding: 24px; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="flex min-h-screen">

  <aside class="ant-sider flex flex-col">
    <div class="logo h-14 flex flex-col items-center justify-center">
      <div class="brand-title"><span style="color:#e6a23c">唯普</span>汽车</div>
      <div class="brand-sub">www.chevip.com</div>
    </div>
    <div class="sys-label">FNC</div>
    <nav class="flex-1 overflow-y-auto">
      <div class="menu-item" onclick="const s=this.nextElementSibling;this.classList.toggle('open');s.style.display=s.style.display==='none'?'':'none'"><i data-lucide="database" class="w-4 h-4"></i><span>业务数据</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu" style="display:none">
        <div class="sub-item">订单流水</div>
        <div class="sub-item">用户余额</div>
      </div>

      <div class="menu-item open"><i data-lucide="wallet" class="w-4 h-4"></i><span>财务管理</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu">
        <a href="fnc-home.html"        class="sub-item active">首页</a>
        <a href="fnc-wallet-log.html"  class="sub-item">钱包账单</a>
      </div>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">

    <header class="ant-header px-4 flex items-center justify-between">
      <div class="flex items-center gap-2 text-sm text-slate-600">
        <i data-lucide="menu" class="w-4 h-4"></i>
        <span>首页</span><span class="text-slate-300">/</span>
        <span class="inline-flex items-center gap-1"><i data-lucide="wallet" class="w-3.5 h-3.5"></i>财务管理</span>
        <span class="text-slate-300">/</span>
        <span class="breadcrumb-current">首页</span>
      </div>
      <div class="flex items-center gap-4 text-sm text-slate-600">
        <div class="flex items-center gap-2 cursor-pointer">
          <div class="w-7 h-7 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
          </div>
          <span>ylj</span>
          <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
        </div>
      </div>
    </header>

    <main class="flex-1 p-4 overflow-auto">
      <div class="ant-card">
        <div class="text-center text-slate-400 py-20">
          <i data-lucide="wallet" class="w-12 h-12 mx-auto mb-3 text-slate-300"></i>
          <div class="text-base mb-1">财务管理 · 首页</div>
          <div class="text-xs">概览数据待补充。请通过左侧菜单进入「钱包账单」查看流水。</div>
        </div>
      </div>
    </main>
  </div>

</div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const { createApp, onMounted } = Vue;
createApp({ setup() { onMounted(() => lucide.createIcons()); return {}; } }).mount('#app');
</script>

<div class="hidden md:block fixed bottom-4 left-4 z-50">
  <a href="../index.html" class="px-3 py-1.5 bg-white rounded-full shadow text-xs text-slate-600 hover:bg-slate-50 border border-slate-200">← 返回 Demo 导航</a>
</div>
</body>
</html>
