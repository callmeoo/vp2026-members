<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户等级管理 · 销售管理 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color:#303133; font-size:13px; }
  [v-cloak] { display:none; }
  .ant-sider { background: #304156; width: 200px; flex: 0 0 200px; color: #bfcbd9; }
  .ant-sider .logo { background: #263445; }
  .ant-sider .brand-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
  .ant-sider .brand-sub { color: #8492a6; font-size: 10px; margin-top: 2px; letter-spacing: 1px; }
  .ant-sider .menu-item { display: flex; align-items: center; gap: 10px; padding: 0 20px; height: 44px; color: #bfcbd9; font-size: 13px; cursor: pointer; }
  .ant-sider .menu-item:hover { background: #263445; color: #fff; }
  .ant-sider .menu-item.open { background: #1f2d3d; color: #fff; }
  .ant-sider .menu-item i.chevron { margin-left: auto; transition: transform .2s; }
  .ant-sider .menu-item.open i.chevron { transform: rotate(90deg); }
  .ant-sider .submenu { background: #1f2d3d; }
  .ant-sider .submenu .sub-item { display: flex; align-items: center; height: 40px; padding-left: 50px; color: #bfcbd9; font-size: 13px; cursor: pointer; text-decoration: none; }
  .ant-sider .submenu .sub-item:hover { color: #fff; background: #001528; }
  .ant-sider .submenu .sub-item.active { color: #409eff; background: #263445; }
  .ant-header { height: 50px; background:#fff; border-bottom:1px solid #e4e7ed; }
  .breadcrumb-current { color: #303133; font-weight: 500; }
  .ant-card { background: #fff; border-radius: 4px; }
</style>
</head>
<body>
<div id="app" v-cloak>
<div class="flex min-h-screen">
  <aside class="ant-sider flex flex-col">
    <div class="logo h-14 flex flex-col items-center justify-center">
      <div class="brand-title"><span style="color:#e6a23c">唯普</span>汽车</div>
      <div class="brand-sub">www.chevip.com</div>
    </div>
    <nav class="flex-1 overflow-y-auto">
      <div class="menu-item open" onclick="const s=this.nextElementSibling;this.classList.toggle('open');s.style.display=s.style.display==='none'?'':'none'"><i data-lucide="database" class="w-4 h-4"></i><span>业务数据</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu">
        <a href="bms-orders.html" class="sub-item">订单列表<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-order-detail.html" class="sub-item">订单详情<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-users.html"  class="sub-item">用户列表<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-user-detail.html" class="sub-item">用户详情<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
      </div>

      <div class="menu-item open"><i data-lucide="bar-chart-3" class="w-4 h-4"></i><span>销售管理</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu">
        <a href="dashboard.html"           class="sub-item">运营仪表盘<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#10b981;color:#fff;font-weight:500;letter-spacing:0">新增</span></a>
        <a href="bms-level-mgmt.html"      class="sub-item active" onclick="event.preventDefault();showRuleAlert('按新规则调整用户等级', this.href)">客户等级管理<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-sales-buyers.html"    class="sub-item">买家管理<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-sales-buyer-detail.html" class="sub-item">买家详情<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-sales-orders.html"    class="sub-item" onclick="event.preventDefault();showRuleAlert('按新规则调整用户等级', this.href)">销售订单<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a style="display:none" href="level-rule.html"          class="sub-item">等级设置</a>
        <a href="coin-rule.html"           class="sub-item">积分规则<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#10b981;color:#fff;font-weight:500;letter-spacing:0">新增</span></a>
        <a href="rewards.html"             class="sub-item">商城商品配置<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#10b981;color:#fff;font-weight:500;letter-spacing:0">新增</span></a>
        <a href="bms-coin-log.html"        class="sub-item">积分流水<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#10b981;color:#fff;font-weight:500;letter-spacing:0">新增</span></a>
        <a href="bms-redeem-log.html"      class="sub-item">兑换记录<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#10b981;color:#fff;font-weight:500;letter-spacing:0">新增</span></a>
      </div>

      <div class="menu-item open" onclick="const s=this.nextElementSibling;this.classList.toggle('open');s.style.display=s.style.display==='none'?'':'none'"><i data-lucide="headphones" class="w-4 h-4"></i><span>服务中心</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu">
        <a href="bms-aftersales.html"                class="sub-item">售后服务</a>
        <a href="bms-aftersales-list.html"           class="sub-item" onclick="event.preventDefault();showRuleAlert('用户等级更新', this.href)">售后列表<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
        <a href="bms-aftersale-approval-list.html" class="sub-item" onclick="event.preventDefault();showRuleToast('无理由权益使用的说明', this.href)">企微审批<span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:3px;background:#f59e0b;color:#fff;font-weight:500;letter-spacing:0">调整</span></a>
      </div>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="ant-header px-4 flex items-center justify-between">
      <div class="flex items-center gap-2 text-sm text-slate-600">
        <i data-lucide="menu" class="w-4 h-4"></i>
        <span>首页</span><span class="text-slate-300">/</span>
        <span class="inline-flex items-center gap-1"><i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i>销售管理</span>
        <span class="text-slate-300">/</span>
        <span class="breadcrumb-current">客户等级管理</span>
      </div>
      <div class="flex items-center gap-4 text-sm text-slate-600">
        <div class="flex items-center gap-2 cursor-pointer">
          <div class="w-7 h-7 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
          </div>
          <span>cpylj</span>
          <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
        </div>
      </div>
    </header>

    <main class="flex-1 p-4 overflow-auto">
      <div class="ant-card" style="padding:64px 20px;text-align:center;color:#909399">
        <i data-lucide="users" class="w-12 h-12 mx-auto mb-3 text-slate-300"></i>
        <div class="text-base mb-1">客户等级管理</div>
        <div class="text-xs">本期按新规则进行用户等级管理，详细界面待补充。</div>
      </div>
    </main>
  </div>

</div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_sidebar-alert.js"></script>
<script>
const { createApp, onMounted } = Vue;
createApp({ setup() { onMounted(() => lucide.createIcons()); return {}; } }).mount('#app');
</script>

<div class="hidden md:block fixed bottom-4 left-4 z-50">
  <a href="../index.html" class="px-3 py-1.5 bg-white rounded-full shadow text-xs text-slate-600 hover:bg-slate-50 border border-slate-200">← 返回 Demo 导航</a>
</div>
</body>
</html>
