<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企微审批 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background: #f0f2f5; color: #303133; font-size: 13px; }
  [v-cloak] { display:none; }
  .ant-sider { background: #304156; width: 200px; flex: 0 0 200px; color: #bfcbd9; }
  .ant-sider .logo { background: #263445; }
  .ant-sider .brand-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
  .ant-sider .brand-sub { color: #8492a6; font-size: 10px; margin-top: 2px; letter-spacing: 1px; }
  .ant-sider .menu-item { display: flex; align-items: center; gap: 10px; padding: 0 20px; height: 44px; color: #bfcbd9; font-size: 13px; cursor: pointer; }
  .ant-sider .menu-item.active { background: #409eff; color: #fff; }
  .ant-header { height: 50px; background: #fff; border-bottom: 1px solid #e4e7ed; }
  .breadcrumb-current { color: #303133; font-weight: 500; }
  .page-toolbar { background: #fff; padding: 10px 16px; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center; gap: 12px; }
  .tb-tab { padding: 6px 14px; border-radius: 4px; font-size: 13px; color: #606266; cursor: pointer; border: 1px solid transparent; }
  .tb-tab.active { background: #ecf5ff; color: #409eff; border-color: #b3d8ff; }
  .tb-spacer { flex: 1; }
  .tb-meta { color: #909399; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .preview-stage { padding: 24px; display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
  .phone-frame { position: relative; width: 380px; height: 780px; background: #1a1a1a; border-radius: 40px; padding: 14px; box-shadow: 0 24px 60px rgba(0,0,0,.25); }
  .phone-frame::before { content: ""; position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 110px; height: 22px; background: #1a1a1a; border-radius: 14px; z-index: 2; }
  .phone-screen { width: 100%; height: 100%; background: #fff; border-radius: 28px; overflow: hidden; position: relative; }
  .phone-screen iframe { width: 100%; height: 100%; border: 0; display: block; }
  .phone-caption { text-align: center; margin-top: 14px; font-size: 13px; color: #606266; }
  .phone-caption .sub { color: #909399; font-size: 11px; margin-top: 2px; }
  .info-banner { background: #ecf5ff; border: 1px solid #b3d8ff; color: #409eff; padding: 10px 14px; margin: 16px 24px 0; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
</style>
</head>
<body>

<div id="app" v-cloak>
<div class="flex min-h-screen">

  <aside class="ant-sider flex flex-col">
    <div class="logo h-14 flex flex-col items-center justify-center">
      <div class="brand-title"><span style="color:#e6a23c">唯普</span>汽车</div>
      <div class="brand-sub">www.chevip.com</div>
    </div>
    <nav class="flex-1 overflow-y-auto">
      <a href="bms-orders.html" class="menu-item"><i data-lucide="database" class="w-4 h-4"></i><span>业务数据</span></a>
      <a href="bms-sales-orders.html" class="menu-item"><i data-lucide="bar-chart-3" class="w-4 h-4"></i><span>销售管理</span></a>
      <a href="bms-aftersales.html" class="menu-item"><i data-lucide="headphones" class="w-4 h-4"></i><span>服务中心</span></a>
      <div class="menu-item active"><i data-lucide="message-square" class="w-4 h-4"></i><span>企微审批</span></div>
      <div class="menu-item" onclick="const s=this.nextElementSibling;this.classList.toggle('open');s.style.display=s.style.display==='none'?'':'none'"><i data-lucide="settings" class="w-4 h-4"></i><span>运营部</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu" style="display:none">
        <div class="sub-item">内容管理</div>
        <div class="sub-item">优惠券</div>
        <div class="sub-item">权益卡管理</div>
        <div class="sub-item">权益卡投放管理</div>
        <div class="sub-item">权益卡发放管理</div>
        <div class="sub-item">奖品投放</div>
      </div>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="ant-header flex items-center justify-between px-4">
      <div class="flex items-center gap-1 text-sm text-slate-600">
        <i data-lucide="home" class="w-3.5 h-3.5 text-slate-400"></i><span>首页</span>
        <span class="text-slate-300 mx-1">/</span><span class="breadcrumb-current">企微审批</span>
      </div>
      <div class="flex items-center gap-2 text-sm">
        <div class="w-7 h-7 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center"><i data-lucide="user" class="w-4 h-4 text-slate-500"></i></div>
        <span>ylj</span>
      </div>
    </header>

    <div class="page-toolbar">
      <span v-for="t in tabs" :key="t.key" :class="['tb-tab', { active: view === t.key }]" @click="view = t.key">{{ t.label }}</span>
      <div class="tb-spacer"></div>
      <span class="tb-meta"><i data-lucide="smartphone" class="w-3.5 h-3.5"></i>企微 H5 审批 · 移动端实时预览</span>
    </div>

    <div class="info-banner">
      <i data-lucide="info" class="w-4 h-4"></i>
      <span>客服提交的售后申请会同步推送到企微审批流。下方以手机界面实时展示审批人端收到的 H5 页面,可切换「申请列表 / 审批详情」查看。</span>
    </div>

    <main class="flex-1 overflow-auto">
      <div class="preview-stage">
        <div v-show="view === 'list'">
          <div class="phone-frame">
            <div class="phone-screen"><iframe src="../app/aftersale-approval-list.html"></iframe></div>
          </div>
          <div class="phone-caption">
            审批人端 · 售后申请列表
            <div class="sub">客服主管 / 区域经理 / 售后经理等审批人首页</div>
          </div>
        </div>
        <div v-show="view === 'detail'">
          <div class="phone-frame">
            <div class="phone-screen"><iframe src="../app/aftersale-approval-detail.html?id=su-a3333"></iframe></div>
          </div>
          <div class="phone-caption">
            审批人端 · 售后审批详情
            <div class="sub">含「无理由退车权益」使用说明 · 驳回 / 审批通过</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="fixed top-2 right-4 z-50">
  <a href="../index.html" class="px-3 py-1 bg-white border border-slate-200 rounded shadow-sm text-xs text-slate-600 hover:bg-slate-50"><i data-lucide="arrow-left" class="w-3 h-3 inline -mt-0.5"></i> Demo 导航</a>
</div>
</div><!-- /#app -->

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;

createApp({
  setup() {
    const view = ref('list');
    const tabs = [
      { key:'list',   label:'售后申请列表' },
      { key:'detail', label:'售后审批详情' }
    ];
    onMounted(() => lucide.createIcons());
    return { view, tabs };
  }
}).mount('#app');
</script>
</body>
</html>
