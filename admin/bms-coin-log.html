<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>积分流水 · 销售管理 · 唯普汽车</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; color: #303133; font-size: 13px; }
  .ant-sider { background: #304156; width: 200px; flex: 0 0 200px; color: #bfcbd9; }
  .ant-sider .logo { background: #263445; }
  .ant-sider .brand-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
  .ant-sider .brand-sub { color: #8492a6; font-size: 10px; margin-top: 2px; letter-spacing: 1px; }
  .ant-sider .menu-item { display: flex; align-items: center; gap: 10px; padding: 0 20px; height: 44px; color: #bfcbd9; font-size: 13px; cursor: pointer; }
  .ant-sider .menu-item:hover { background: #263445; color: #fff; }
  .ant-sider .menu-item.open { background: #1f2d3d; color: #fff; }
  .ant-sider .menu-item i.chevron { margin-left: auto; transition: transform .2s; }
  .ant-sider .menu-item.open i.chevron { transform: rotate(90deg); }
  .ant-sider .submenu { background: #1f2d3d; }
  .ant-sider .submenu .sub-item { display: flex; align-items: center; height: 40px; padding-left: 50px; color: #bfcbd9; font-size: 13px; cursor: pointer; }
  .ant-sider .submenu .sub-item:hover { color: #fff; background: #001528; }
  .ant-sider .submenu .sub-item.active { color: #409eff; background: #263445; }

  .ant-header { height: 50px; background: #fff; border-bottom: 1px solid #e4e7ed; }
  .ant-card { background: #fff; border-radius: 2px; }

  .el-input, .el-select { position: relative; display: inline-flex; align-items: center; }
  .el-input input, .el-select select { width: 100%; height: 32px; padding: 0 12px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; color: #606266; font-size: 13px; line-height: 32px; outline: none; box-sizing: border-box; }
  .el-input input:focus, .el-select select:focus { border-color: #409eff; }
  .el-label { color: #606266; font-size: 13px; line-height: 32px; padding-right: 8px; white-space: nowrap; }
  .date-sep { color: #c0c4cc; padding: 0 6px; font-size: 12px; }
  .el-btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 16px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #dcdfe6; background: #fff; color: #606266; box-sizing: border-box; }
  .el-btn:hover { color: #409eff; border-color: #c6e2ff; background: #ecf5ff; }
  .el-btn-primary { background: #409eff; color: #fff; border-color: #409eff; }
  .el-btn-primary:hover { background: #66b1ff; color: #fff; border-color: #66b1ff; }

  .el-table { width: 100%; border-collapse: collapse; font-size: 13px; color: #606266; }
  .el-table thead th { background: #f5f7fa; color: #909399; font-weight: 500; padding: 10px 10px; border-bottom: 1px solid #ebeef5; text-align: center; white-space: nowrap; }
  .el-table tbody td { padding: 10px 10px; border-bottom: 1px solid #ebeef5; text-align: center; vertical-align: middle; }
  .el-table tbody tr:hover { background: #f5f7fa; }

  .lv-badge { display: inline-flex; align-items: center; justify-content: center; height: 16px; min-width: 22px; padding: 0 4px; border-radius: 3px; color: #fff; font-size: 10px; font-weight: 700; font-style: italic; letter-spacing: .5px; }
  .amount-plus { color: #67c23a; font-weight: 600; }
  .amount-minus { color: #f56c6c; font-weight: 600; }
  .tag { display: inline-flex; align-items: center; padding: 0 8px; height: 22px; border-radius: 3px; font-size: 12px; }
  .tag-blue { background: #ecf5ff; color: #409eff; border: 1px solid #b3d8ff; }
  .tag-green { background: #f0f9eb; color: #67c23a; border: 1px solid #c2e7b0; }
  .tag-orange { background: #fdf6ec; color: #e6a23c; border: 1px solid #f5dab1; }
  .tag-gray { background: #f4f4f5; color: #909399; border: 1px solid #e9e9eb; }
  .tag-purple { background: #f5f0ff; color: #8b5cf6; border: 1px solid #d9c7ff; }

  .el-pagination { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 14px 16px; color: #606266; font-size: 13px; }
  .pager-btn { min-width: 28px; height: 28px; padding: 0 6px; border-radius: 2px; background: #f4f4f5; color: #606266; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 12px; }
  .pager-btn:hover { color: #409eff; }
  .pager-btn.active { background: #409eff; color: #fff; }
  .pager-arrow { min-width: 28px; height: 28px; background: #f4f4f5; color: #606266; border: none; cursor: pointer; border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; }

  .stat-tile { border: 1px solid #e4e7ed; border-radius: 4px; padding: 16px 20px; }
  .stat-tile .label { font-size: 13px; color: #909399; }
  .stat-tile .num { font-size: 28px; font-weight: 600; color: #303133; margin-top: 4px; }
  .stat-tile .num.green { color: #67c23a; }
  .stat-tile .num.red { color: #f56c6c; }
</style>
</head>
<body>

<div class="flex min-h-screen">

  <!-- Sider -->
  <aside class="ant-sider flex flex-col">
    <div class="logo h-14 flex flex-col items-center justify-center">
      <div class="brand-title"><span style="color:#e6a23c">唯普</span>汽车</div>
      <div class="brand-sub">www.chevip.com</div>
    </div>
    <nav class="flex-1 overflow-y-auto">

      <div class="menu-item open"><i data-lucide="bar-chart-3" class="w-4 h-4"></i><span>销售管理</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu">
        <div class="sub-item">客户等级管理</div>
        <a href="bms-sales-buyers.html" class="sub-item">买家管理</a>
        <a href="bms-sales-orders.html" class="sub-item">销售订单</a>
        <a href="level-rule.html" class="sub-item">等级设置</a>
        <a href="coin-rule.html" class="sub-item">积分规则</a>
        <a href="rewards.html" class="sub-item">商城商品配置</a>
        <a href="bms-coin-log.html" class="sub-item active">积分流水</a>
        <a href="bms-redeem-log.html" class="sub-item">兑换记录</a>
      </div>

      <div class="menu-item"><i data-lucide="headphones" class="w-4 h-4"></i><span>服务中心</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="menu-item" onclick="const s=this.nextElementSibling;this.classList.toggle('open');s.style.display=s.style.display==='none'?'':'none'"><i data-lucide="settings" class="w-4 h-4"></i><span>运营部</span><i data-lucide="chevron-right" class="w-3 h-3 chevron"></i></div>
      <div class="submenu" style="display:none">
        <div class="sub-item">内容管理</div>
        <div class="sub-item">优惠券</div>
        <div class="sub-item">权益卡管理</div>
        <div class="sub-item">权益卡投放管理</div>
        <div class="sub-item">权益卡发放管理</div>
        <div class="sub-item">奖品投放</div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">

    <header class="ant-header flex items-center justify-between px-4">
      <div class="flex items-center gap-4 text-sm text-slate-600">
        <i data-lucide="menu" class="w-5 h-5 cursor-pointer text-slate-500"></i>
        <div class="flex items-center gap-1">
          <i data-lucide="home" class="w-3.5 h-3.5 text-slate-400"></i>
          <span>首页</span>
          <span class="text-slate-300">/</span>
          <i data-lucide="bar-chart-3" class="w-3.5 h-3.5 text-slate-400"></i>
          <span>销售管理</span>
          <span class="text-slate-300">/</span>
          <span class="font-medium">积分流水</span>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <i data-lucide="download" class="w-4 h-4 text-blue-500 cursor-pointer"></i>
        <div class="flex items-center gap-2 cursor-pointer">
          <div class="w-7 h-7 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
          </div>
          <span class="text-sm text-slate-600">ylj</span>
          <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
        </div>
      </div>
    </header>

    <main class="flex-1 p-3 overflow-auto">

      <!-- 汇总卡片 -->
      <div class="grid grid-cols-3 gap-3 mb-3">
        <div class="stat-tile bg-white"><div class="label">本月发放(积分)</div><div class="num green">+ 1,280,000</div></div>
        <div class="stat-tile bg-white"><div class="label">本月消耗(积分)</div><div class="num red">- 568,300</div></div>
        <div class="stat-tile bg-white"><div class="label">本月到期(积分)</div><div class="num">86,420</div></div>
      </div>

      <!-- 筛选 -->
      <div class="ant-card p-4 mb-3">
        <div class="grid grid-cols-4 gap-x-4 gap-y-3">
          <div class="flex items-center">
            <span class="el-label" style="width:80px">用户账号:</span>
            <div class="el-input flex-1"><input placeholder="手机号/用户名" /></div>
          </div>
          <div class="flex items-center">
            <span class="el-label" style="width:80px">流水类型:</span>
            <div class="el-select flex-1">
              <select>
                <option>全部</option>
                <option>发放</option>
                <option>消耗</option>
                <option>到期</option>
                <option>调整</option>
              </select>
            </div>
          </div>
          <div class="flex items-center">
            <span class="el-label" style="width:80px">行为:</span>
            <div class="el-select flex-1">
              <select>
                <option>全部</option>
                <option>成交奖励</option>
                <option>转发朋友圈</option>
                <option>出价</option>
                <option>人工调整</option>
                <option>兑换扣减</option>
              </select>
            </div>
          </div>
          <div class="flex items-center col-span-2">
            <span class="el-label" style="width:80px">发生时间:</span>
            <div class="el-input flex-1"><input type="date" /></div>
            <span class="date-sep">~</span>
            <div class="el-input flex-1"><input type="date" /></div>
          </div>
          <div class="flex items-center col-span-2 justify-end gap-2">
            <button class="el-btn"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>重置</button>
            <button class="el-btn el-btn-primary"><i data-lucide="search" class="w-3.5 h-3.5"></i>查询</button>
            <button class="el-btn">导出</button>
          </div>
        </div>
      </div>

      <!-- 表格 -->
      <div class="ant-card">
        <div class="overflow-x-auto">
          <table class="el-table">
            <thead>
              <tr>
                <th>流水号</th>
                <th>用户</th>
                <th>类型</th>
                <th>行为</th>
                <th>变动积分</th>
                <th>到期时间</th>
                <th>发生时间</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
        <div class="el-pagination">
          <span style="margin-right:8px;color:#909399">共 12,840 条</span>
          <button class="pager-arrow"><i data-lucide="chevron-left" class="w-3.5 h-3.5"></i></button>
          <button class="pager-btn active">1</button>
          <button class="pager-btn">2</button>
          <button class="pager-btn">3</button>
          <span>...</span>
          <button class="pager-btn">1284</button>
          <button class="pager-arrow"><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i></button>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="fixed top-2 right-4 z-50">
  <a href="../index.html" class="px-3 py-1 bg-white border border-slate-200 rounded shadow-sm text-xs text-slate-600 hover:bg-slate-50"><i data-lucide="arrow-left" class="w-3 h-3 inline -mt-0.5"></i> Demo 导航</a>
</div>

<script src="../shared/member-config.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>

    { sn:"CL202604221842", user:"陈敏",   phone:"137****4410", level:"V2", type:"发放", src:"成交奖励", delta:+1500, balance:12600, expire:"2027-04-22", time:"2026-04-22 18:42:28", note:"订单 SO2026042205 成交奖励" },
    { sn:"CL202604221618", user:"张晓雯", phone:"159****0032", level:"V1", type:"调整", src:"人工调整", delta:+1000, balance:4800,  expire:"2027-04-22", time:"2026-04-22 16:18:11", note:"客服工单 CS20260422#3389 补偿" },

  const typeTag = (t) => {
    if (t === "发放") return "tag tag-green";
    if (t === "消耗") return "tag tag-orange";
    if (t === "到期") return "tag tag-gray";
    if (t === "调整") return "tag tag-purple";
    return "tag tag-blue";
  };
  const levelColor = (code) => window.MEMBER_CONFIG.getLevelByCode(code).color;

  document.getElementById("logBody").innerHTML = logs.map(l => `

</script>
</body>
</html>
