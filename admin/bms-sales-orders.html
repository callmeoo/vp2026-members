tn">2</button> <button class="pager-btn">3</button> <button class="pager-arrow"><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i></button> <select class="page-size-select"> <option>10 条/页</option> <option>20 条/页</option> <option>50 条/页</option> </select> <span>跳至</span> <input class="page-jump-input" value="1" /> <span>页</span> </div> </div> </main> </div></div><div class="fixed top-2 right-4 z-50"> <a href="../index.html" class="px-3 py-1 bg-white border border-slate-200 rounded shadow-sm text-xs text-slate-600 hover:bg-slate-50">← Demo 导航</a></div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script> const orders = [ { sn: "SO2026041901", customer: "王磊", model: "比亚迪 宋PLUS 2024款 DM-i 冠军版", channel: "B2C零售", store: "唯普广州体验店", seller: "李娜", time: "2026-04-19 10:24", status: "待付款", price: "158800.00", coin: "1200" }, { sn: "SO2026041805", customer: "陈敏", model: "丰田 bZ3 2023款 616km 长续航PRO", channel: "门店", store: "唯普深圳旗舰店", seller: "赵强", time: "2026-04-18 16:12", status: "待交付", price: "176500.00", coin: "800" }, { sn: "SO2026041802", customer: "深圳市润泽科技", model: "特斯拉 Model Y 2024款 后轮驱动版", channel: "政企大客户", store: "唯普深圳旗舰店", seller: "孙伟", time: "2026-04-18 11:05", status: "已完成", price: "258900.00", coin: "0" }, { sn: "SO2026041703", customer: "张晓雯", model: "哈弗 H6 2023款 1.5T 豪华型", channel: "门店", store: "唯普广州体验店", seller: "李娜", time: "2026-04-17 14:50", status: "已完成", price: "108600.00", coin: "500" }, { sn: "SO2026041702", customer: "刘洋", model: "大众 途观L 2023款 330TSI 两驱 舒适版", channel: "B2C零售", store: "—", seller: "周航", time: "2026-04-17 09:32", status: "待付款", price: "213400.00", coin: "0" }, { sn: "SO2026041601", customer: "陆嘉豪", model: "坦克 300 2023款 2.0T 越野版", channel: "门店", store: "唯普长沙店", seller: "吴敏", time: "2026-04-16 15:20", status: "已取消", price: "213000.00", coin: "0" }, { sn: "SO2026041504", customer: "黄楚雄", model: "本田 CR-V 2024款 240TURBO 两驱净享版", channel: "门店", store: "唯普佛山店", seller: "黄磊", time: "2026-04-15 17:48", status: "待交
